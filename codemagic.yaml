workflows:
  medevac-android:
    name: MedEvac Android APK
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      java: 17
      node: 20
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          npm install -g @bubblewrap/cli
      - name: Prepare TWA project
        script: |
          mkdir -p twa-build && cd twa-build
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.medevac.app",
            "host": "unit-e-1d07b.web.app",
            "name": "MedEvac",
            "launcherName": "MedEvac",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#1d4ed8",
            "navigationColor": "#1e40af",
            "backgroundColor": "#f0f6ff",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://unit-e-1d07b.web.app/icon-512.png",
            "maskableIconUrl": "https://unit-e-1d07b.web.app/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./keystore.jks",
              "alias": "medevac"
            },
            "appVersionCode": 1,
            "appVersion": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "fallbackType": "customtabs",
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "fingerprints": []
          }
          EOF
      - name: Generate signing keystore
        script: |
          cd twa-build
          keytool -genkeypair \
            -alias medevac \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -keystore keystore.jks \
            -storepass "$CM_KEYSTORE_PASSWORD" \
            -keypass "$CM_KEYSTORE_PASSWORD" \
            -dname "CN=MedEvac, O=MedEvac, L=Kuwait, C=KW"
      - name: Build TWA APK
        script: |
          cd twa-build
          bubblewrap build \
            --manifest twa-manifest.json \
            --signingKeyPath ./keystore.jks \
            --signingKeyAlias medevac \
            --signingKeyPassword "$CM_KEYSTORE_PASSWORD" \
            --signingStorePassword "$CM_KEYSTORE_PASSWORD"
    artifacts:
      - twa-build/app-release-signed.apk

  medevac-ios:
    name: MedEvac iOS App
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        BUNDLE_ID: com.medevac.app
        APP_STORE_CONNECT_KEY_ID: 346WF7MN3Z
        APP_STORE_CONNECT_ISSUER_ID: 5988b726-9289-48c6-ac37-4c603d29fa6a
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Copy web assets
        script: |
          cp MAK_Registry/index.html ios/MedEvac/MedEvac/
          cp MAK_Registry/sw.js ios/MedEvac/MedEvac/
          cp MAK_Registry/manifest.json ios/MedEvac/MedEvac/
          cp MAK_Registry/icon-192.png ios/MedEvac/MedEvac/
          cp MAK_Registry/icon-512.png ios/MedEvac/MedEvac/

      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd ios/MedEvac
          xcodegen generate

      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates

          # Debug: list available certificates
          echo "=== Certificates in keychain ==="
          security find-identity -v -p codesigning

          # Install provisioning profiles
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "=== Available profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "No profiles dir"

          # Try use-profiles
          xcode-project use-profiles --verbose || echo "use-profiles failed, continuing..."

          # Debug: check what profiles are now installed
          echo "=== Installed profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || true

      - name: Build iOS app
        script: |
          cd ios/MedEvac

          # Find provisioning profile UUID
          PROFILE_UUID=""
          for profile in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            if [ -f "$profile" ]; then
              PROFILE_UUID=$(security cms -D -i "$profile" 2>/dev/null | grep -A1 UUID | grep string | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
              PROFILE_NAME=$(security cms -D -i "$profile" 2>/dev/null | grep -A1 Name | head -2 | grep string | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
              echo "Found profile: $PROFILE_NAME (UUID: $PROFILE_UUID)"
            fi
          done

          if [ -n "$PROFILE_UUID" ]; then
            echo "Using profile UUID: $PROFILE_UUID"
            xcodebuild archive \
              -project MedEvac.xcodeproj \
              -scheme MedEvac \
              -sdk iphoneos \
              -configuration Release \
              -archivePath build/MedEvac.xcarchive \
              DEVELOPMENT_TEAM="YPGU5K4U57" \
              CODE_SIGN_STYLE="Manual" \
              CODE_SIGN_IDENTITY="Apple Distribution" \
              PROVISIONING_PROFILE="$PROFILE_UUID" \
              PROVISIONING_PROFILE_SPECIFIER="" \
              clean archive
          else
            echo "No provisioning profile found, trying automatic signing..."
            xcodebuild archive \
              -project MedEvac.xcodeproj \
              -scheme MedEvac \
              -sdk iphoneos \
              -configuration Release \
              -archivePath build/MedEvac.xcarchive \
              DEVELOPMENT_TEAM="YPGU5K4U57" \
              CODE_SIGN_STYLE="Manual" \
              CODE_SIGN_IDENTITY="Apple Distribution" \
              clean archive
          fi

      - name: Export IPA
        script: |
          cd ios/MedEvac
          xcode-project build-ipa \
            --archive-path build/MedEvac.xcarchive \
            || xcodebuild -exportArchive \
              -archivePath build/MedEvac.xcarchive \
              -exportPath build/export \
              -exportOptionsPlist ExportOptions.plist

    artifacts:
      - ios/MedEvac/build/*.ipa
      - ios/MedEvac/build/export/*.ipa

    publishing:
      email:
        recipients:
          - b.alhaddad13@gmail.com
        notify:
          success: true
          failure: true
