workflows:
  medevac-android:
    name: MedEvac Android APK
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      java: 17
      node: 20
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          npm install -g @bubblewrap/cli
      - name: Prepare TWA project
        script: |
          mkdir -p twa-build && cd twa-build
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.medevac.app",
            "host": "unit-e-1d07b.web.app",
            "name": "MedEvac",
            "launcherName": "MedEvac",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#1d4ed8",
            "navigationColor": "#1e40af",
            "backgroundColor": "#f0f6ff",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://unit-e-1d07b.web.app/icon-512.png",
            "maskableIconUrl": "https://unit-e-1d07b.web.app/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./keystore.jks",
              "alias": "medevac"
            },
            "appVersionCode": 1,
            "appVersion": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "fallbackType": "customtabs",
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "fingerprints": []
          }
          EOF
      - name: Generate signing keystore
        script: |
          cd twa-build
          keytool -genkeypair \
            -alias medevac \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -keystore keystore.jks \
            -storepass "$CM_KEYSTORE_PASSWORD" \
            -keypass "$CM_KEYSTORE_PASSWORD" \
            -dname "CN=MedEvac, O=MedEvac, L=Kuwait, C=KW"
      - name: Build TWA APK
        script: |
          cd twa-build
          bubblewrap build \
            --manifest twa-manifest.json \
            --signingKeyPath ./keystore.jks \
            --signingKeyAlias medevac \
            --signingKeyPassword "$CM_KEYSTORE_PASSWORD" \
            --signingStorePassword "$CM_KEYSTORE_PASSWORD"
    artifacts:
      - twa-build/app-release-signed.apk

  medevac-ios:
    name: MedEvac iOS App
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      groups:
        - apple_credentials
      vars:
        BUNDLE_ID: com.medevac.app
        APP_STORE_CONNECT_KEY_ID: 346WF7MN3Z
        APP_STORE_CONNECT_ISSUER_ID: 5988b726-9289-48c6-ac37-4c603d29fa6a
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Copy web assets
        script: |
          cp MAK_Registry/index.html ios/MedEvac/MedEvac/
          cp MAK_Registry/sw.js ios/MedEvac/MedEvac/
          cp MAK_Registry/manifest.json ios/MedEvac/MedEvac/
          cp MAK_Registry/icon-192.png ios/MedEvac/MedEvac/
          cp MAK_Registry/icon-512.png ios/MedEvac/MedEvac/

      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: |
          cd ios/MedEvac
          xcodegen generate

      - name: Fetch signing files via API
        script: |
          # Generate RSA key for certificate signing
          openssl genrsa -out /tmp/cert_key.pem 2048

          # Fetch certificate + provisioning profile from Apple
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY \
            --certificate-key @file:/tmp/cert_key.pem \
            --create

          # Initialize keychain and install certs
          keychain initialize
          keychain add-certificates

          # Install profiles and configure Xcode project
          xcode-project use-profiles

          # Debug output
          echo "=== Certificates ==="
          security find-identity -v -p codesigning
          echo "=== Profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || true

      - name: Build iOS app
        script: |
          cd ios/MedEvac
          xcodebuild archive \
            -project MedEvac.xcodeproj \
            -scheme MedEvac \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/MedEvac.xcarchive \
            DEVELOPMENT_TEAM="YPGU5K4U57" \
            clean archive

      - name: Export IPA
        script: |
          cd ios/MedEvac
          xcodebuild -exportArchive \
            -archivePath build/MedEvac.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist /Users/builder/export_options.plist
          cp build/export/*.ipa build/ || true

    artifacts:
      - ios/MedEvac/build/*.ipa

    publishing:
      email:
        recipients:
          - b.alhaddad13@gmail.com
        notify:
          success: true
          failure: true
