workflows:
  medevac-android:
    name: MedEvac Android APK
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      java: 17
      node: 20
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          npm install -g @bubblewrap/cli
      - name: Prepare TWA project
        script: |
          mkdir -p twa-build && cd twa-build
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.medevac.app",
            "host": "unit-e-1d07b.web.app",
            "name": "MedEvac",
            "launcherName": "MedEvac",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#1d4ed8",
            "navigationColor": "#1e40af",
            "backgroundColor": "#f0f6ff",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://unit-e-1d07b.web.app/icon-512.png",
            "maskableIconUrl": "https://unit-e-1d07b.web.app/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./keystore.jks",
              "alias": "medevac"
            },
            "appVersionCode": 1,
            "appVersion": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "fallbackType": "customtabs",
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "fingerprints": []
          }
          EOF
      - name: Generate signing keystore
        script: |
          cd twa-build
          keytool -genkeypair \
            -alias medevac \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -keystore keystore.jks \
            -storepass "$CM_KEYSTORE_PASSWORD" \
            -keypass "$CM_KEYSTORE_PASSWORD" \
            -dname "CN=MedEvac, O=MedEvac, L=Kuwait, C=KW"
      - name: Build TWA APK
        script: |
          cd twa-build
          bubblewrap build \
            --manifest twa-manifest.json \
            --signingKeyPath ./keystore.jks \
            --signingKeyAlias medevac \
            --signingKeyPassword "$CM_KEYSTORE_PASSWORD" \
            --signingStorePassword "$CM_KEYSTORE_PASSWORD"
    artifacts:
      - twa-build/app-release-signed.apk

  medevac-ios:
    name: MedEvac iOS App
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Create Xcode project structure
        script: |
          mkdir -p ios/MedEvac/MedEvac
          cp -r MAK_Registry/* ios/MedEvac/MedEvac/

          cat > ios/MedEvac/MedEvac/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>ar</string>
            <key>CFBundleDisplayName</key>
            <string>MedEvac</string>
            <key>CFBundleExecutable</key>
            <string>MedEvac</string>
            <key>CFBundleIdentifier</key>
            <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>$(PRODUCT_NAME)</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchScreen</key>
            <dict>
              <key>UIColorName</key>
              <string>launchBg</string>
            </dict>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
              <string>armv7</string>
            </array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
              <string>UIInterfaceOrientationPortrait</string>
            </array>
          </dict>
          </plist>
          PLIST

          cat > ios/MedEvac/MedEvac/AppDelegate.swift << 'SWIFT'
          import UIKit

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication,
                               didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = ViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          SWIFT

          cat > ios/MedEvac/MedEvac/ViewController.swift << 'SWIFT'
          import UIKit
          import WebKit

          class ViewController: UIViewController, WKNavigationDelegate {
              private var webView: WKWebView!
              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = UIColor(red: 0.118, green: 0.306, blue: 0.847, alpha: 1.0)
                  let config = WKWebViewConfiguration()
                  config.allowsInlineMediaPlayback = true
                  webView = WKWebView(frame: view.bounds, configuration: config)
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  webView.navigationDelegate = self
                  webView.scrollView.bounces = false
                  view.addSubview(webView)
                  if let htmlPath = Bundle.main.path(forResource: "index", ofType: "html") {
                      let htmlURL = URL(fileURLWithPath: htmlPath)
                      webView.loadFileURL(htmlURL, allowingReadAccessTo: htmlURL.deletingLastPathComponent())
                  }
              }
              override var preferredStatusBarStyle: UIStatusBarStyle { .lightContent }
          }
          SWIFT

      - name: Generate Xcode project
        script: |
          brew install xcodegen
          cat > ios/MedEvac/project.yml << 'YML'
          name: MedEvac
          options:
            bundleIdPrefix: com.medevac
            deploymentTarget:
              iOS: "15.0"
          targets:
            MedEvac:
              type: application
              platform: iOS
              sources:
                - MedEvac
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.medevac.app
                  MARKETING_VERSION: "1.0"
                  CURRENT_PROJECT_VERSION: 1
                  CODE_SIGN_IDENTITY: "Apple Development"
                  CODE_SIGN_STYLE: Automatic
              resources:
                - path: MedEvac/index.html
                - path: MedEvac/sw.js
                - path: MedEvac/manifest.json
                - path: MedEvac/icon-192.png
                - path: MedEvac/icon-512.png
          YML
          cd ios/MedEvac
          xcodegen generate

      - name: Build iOS app
        script: |
          cd ios/MedEvac
          xcodebuild build \
            -project MedEvac.xcodeproj \
            -scheme MedEvac \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/MedEvac/build/Build/Products/Release-iphonesimulator/MedEvac.app
