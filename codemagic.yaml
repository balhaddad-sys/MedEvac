workflows:
  medevac-android:
    name: MedEvac Android APK
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      java: 17
      node: 20
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Set up Android SDK
        script: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>/dev/null || true
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Download icon
        script: |
          mkdir -p twa-build
          curl -sL "https://unit-e-1d07b.web.app/icon-512.png" -o twa-build/icon-512.png
          ls -la twa-build/icon-512.png

      - name: Restore signing keystore
        script: |
          cd twa-build
          if [ -n "$CM_KEYSTORE_BASE64" ]; then
            echo "$CM_KEYSTORE_BASE64" | base64 --decode > keystore.jks
          else
            keytool -genkeypair \
              -alias medevac \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -keystore keystore.jks \
              -storepass "${CM_KEYSTORE_PASSWORD:?KEYSTORE_PASSWORD not set}" \
              -keypass "${CM_KEYSTORE_PASSWORD:?KEYSTORE_PASSWORD not set}" \
              -dname "CN=MedEvac, O=MedEvac, L=Kuwait, C=KW"
          fi

      - name: Create TWA Android project
        script: |
          cd twa-build

          # settings.gradle
          cat > settings.gradle << 'SETTINGS'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "MedEvac"
          include ':app'
          SETTINGS

          # build.gradle (root)
          cat > build.gradle << 'ROOT'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          ROOT

          # gradle.properties
          cat > gradle.properties << 'PROPS'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          PROPS

          # app/build.gradle
          mkdir -p app/src/main/java/com/medevac/app
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/values

          cat > app/build.gradle << 'APP'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.medevac.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.medevac.app"
                  minSdk 24
                  targetSdk 34
                  versionCode 2
                  versionName "1.1.0"
              }
              signingConfigs {
                  release {
                      storeFile file("../keystore.jks")
                      storePassword System.getenv("CM_KEYSTORE_PASSWORD")
                      keyAlias "medevac"
                      keyPassword System.getenv("CM_KEYSTORE_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.browser:browser:1.7.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          APP

          # Copy icon
          cp icon-512.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:allowBackup="false"
                  android:icon="@mipmap/ic_launcher"
                  android:label="MedEvac"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="false">
                  <activity
                      android:name=".LauncherActivity"
                      android:exported="true"
                      android:screenOrientation="portrait"
                      android:launchMode="singleTask">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https" android:host="unit-e-1d07b.web.app"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

          # Theme (dark status/nav bar)
          cat > app/src/main/res/values/styles.xml << 'STYLES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:statusBarColor">#0f172a</item>
                  <item name="android:navigationBarColor">#0f172a</item>
                  <item name="android:windowBackground">#0f172a</item>
              </style>
          </resources>
          STYLES

          # LauncherActivity.java — TWA launcher
          cat > app/src/main/java/com/medevac/app/LauncherActivity.java << 'JAVA'
          package com.medevac.app;

          import android.net.Uri;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.browser.customtabs.CustomTabsIntent;

          public class LauncherActivity extends AppCompatActivity {
              private static final String URL = "https://unit-e-1d07b.web.app";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  CustomTabsIntent customTabsIntent = new CustomTabsIntent.Builder()
                      .setShareState(CustomTabsIntent.SHARE_STATE_OFF)
                      .build();
                  customTabsIntent.intent.setPackage("com.android.chrome");
                  customTabsIntent.launchUrl(this, Uri.parse(URL));
                  finish();
              }
          }
          JAVA

          # Gradle wrapper
          gradle wrapper --gradle-version 8.5

      - name: Build APK
        script: |
          cd twa-build
          ./gradlew assembleRelease --no-daemon
          cp app/build/outputs/apk/release/app-release.apk ./MedEvac.apk
          ls -la MedEvac.apk

    artifacts:
      - twa-build/MedEvac.apk
      - twa-build/app/build/outputs/apk/**/*.apk

  medevac-ios:
    name: MedEvac iOS App
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      groups:
        - apple_credentials
      vars:
        BUNDLE_ID: com.medevac.app
        APP_STORE_CONNECT_KEY_ID: 346WF7MN3Z
        APP_STORE_CONNECT_ISSUER_ID: 5988b726-9289-48c6-ac37-4c603d29fa6a
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Copy web assets
        script: |
          cp MAK_Registry/index.html ios/MedEvac/MedEvac/
          cp MAK_Registry/sw.js ios/MedEvac/MedEvac/
          cp MAK_Registry/manifest.json ios/MedEvac/MedEvac/
          cp MAK_Registry/icon-192.png ios/MedEvac/MedEvac/
          cp MAK_Registry/icon-512.png ios/MedEvac/MedEvac/

      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate app icons
        script: |
          cd ios/MedEvac/MedEvac
          ICON_DIR=Assets.xcassets/AppIcon.appiconset
          # First create a flattened (no alpha) version of the source icon
          # by compositing onto a white background
          sips -s format png icon-512.png --out /tmp/src_icon.png
          # Remove alpha channel by converting to jpg and back
          sips -s format jpeg /tmp/src_icon.png --out /tmp/icon_flat.jpg
          sips -s format png /tmp/icon_flat.jpg --out /tmp/icon_flat.png
          # Generate all required sizes from the flattened icon
          sips -z 1024 1024 /tmp/icon_flat.png --out $ICON_DIR/icon-1024.png
          sips -z 76 76 /tmp/icon_flat.png --out $ICON_DIR/icon-76.png
          sips -z 152 152 /tmp/icon_flat.png --out $ICON_DIR/icon-152.png
          sips -z 167 167 /tmp/icon_flat.png --out $ICON_DIR/icon-167.png

      - name: Generate Xcode project
        script: |
          cd ios/MedEvac
          xcodegen generate

      - name: Debug - verify icons and plist
        script: |
          echo "=== Icon files ==="
          ls -la ios/MedEvac/MedEvac/Assets.xcassets/AppIcon.appiconset/
          echo "=== Contents.json ==="
          cat ios/MedEvac/MedEvac/Assets.xcassets/AppIcon.appiconset/Contents.json
          echo "=== Generated Info.plist ==="
          cat ios/MedEvac/MedEvac/Info.plist
          echo "=== INFOPLIST_FILE build setting ==="
          cd ios/MedEvac
          xcodebuild -project MedEvac.xcodeproj -scheme MedEvac -showBuildSettings 2>/dev/null | grep -i "INFOPLIST\|ICON\|GENERATE" || true

      - name: Fetch signing files via API
        script: |
          # Generate RSA key for certificate signing
          openssl genrsa -out /tmp/cert_key.pem 2048

          # Fetch certificate + provisioning profile from Apple
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY \
            --certificate-key @file:/tmp/cert_key.pem \
            --create

          # Initialize keychain and install certs
          keychain initialize
          keychain add-certificates

          # Install profiles and configure Xcode project
          xcode-project use-profiles

          # Debug output
          echo "=== Certificates ==="
          security find-identity -v -p codesigning
          echo "=== Profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || true

      - name: Build iOS app
        script: |
          cd ios/MedEvac
          xcodebuild archive \
            -project MedEvac.xcodeproj \
            -scheme MedEvac \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/MedEvac.xcarchive \
            DEVELOPMENT_TEAM="YPGU5K4U57" \
            clean archive

      - name: Export IPA
        script: |
          cd ios/MedEvac
          xcodebuild -exportArchive \
            -archivePath build/MedEvac.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist /Users/builder/export_options.plist
          cp build/export/*.ipa build/ || true

      - name: Upload to TestFlight
        script: |
          app-store-connect publish \
            --path ios/MedEvac/build/MedEvac.ipa \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY

    artifacts:
      - ios/MedEvac/build/*.ipa

    publishing:
      email:
        recipients:
          - b.alhaddad13@gmail.com
        notify:
          success: true
          failure: true
