<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MedEvac">
<meta name="theme-color" content="#0a0a0f">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.firebaseio.com https://*.firebasedatabase.app https://*.googleapis.com https://*.gstatic.com https://fonts.googleapis.com; frame-src 'self' https://*.firebasedatabase.app https://*.firebaseio.com; script-src 'self' 'unsafe-inline' https://*.gstatic.com https://*.firebasedatabase.app; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; connect-src 'self' https://*.firebaseio.com https://*.firebasedatabase.app wss://*.firebasedatabase.app https://*.googleapis.com https://*.gstatic.com https://generativelanguage.googleapis.com; font-src https://fonts.gstatic.com">
<link rel="manifest" href="manifest.json">
<title>MedEvac</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{
  --pri:#0a0a0f;--pri2:#13131a;--pri3:#1a1a24;
  --accent:#6366f1;--accent2:#818cf8;--accent-glow:rgba(99,102,241,.15);
  --bg:#f8f9fc;--bg2:#eef0f5;--card:#ffffff;--card-hover:#fafbfe;
  --text:#0f0f14;--text2:#2d2d3a;--muted:#8b8fa3;--muted2:#b0b4c8;
  --border:#e5e7ee;--border2:#d4d7e3;
  --g:#059669;--gbg:#ecfdf5;--gb:#6ee7b7;--g-glow:rgba(5,150,105,.1);
  --y:#d97706;--ybg:#fffbeb;--yb:#fcd34d;--y-glow:rgba(217,119,6,.1);
  --r:#dc2626;--rbg:#fef2f2;--rb:#fca5a5;--r-glow:rgba(220,38,38,.1);
  --rad:20px;--rad-sm:14px;--rad-xs:10px;
  --shadow-xs:0 1px 2px rgba(0,0,0,.03);
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04);
  --shadow-md:0 2px 8px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.06);
  --shadow-lg:0 4px 12px rgba(0,0,0,.05),0 16px 48px rgba(0,0,0,.08);
  --shadow-glow:0 0 20px rgba(99,102,241,.08);
  --transition:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;direction:rtl;overflow:hidden;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:480px;margin:0 auto;
  background:var(--bg);position:relative;overflow:hidden}
.screen{display:flex;flex-direction:column;height:100%;animation:screenIn .4s var(--transition) both;
  will-change:transform,opacity;transform:translateZ(0)}
@keyframes screenIn{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
@keyframes screenOut{from{opacity:1;transform:none}to{opacity:0;transform:translateY(-8px) scale(.99)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 currentColor}50%{box-shadow:0 0 0 6px transparent}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes shakeX{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes lockPulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.08);opacity:1}}

/* HEADER - Premium frosted glass */
.hdr{background:linear-gradient(135deg,var(--pri) 0%,var(--pri2) 50%,var(--pri3) 100%);
  padding:max(env(safe-area-inset-top),16px) 20px 18px;
  color:#fff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  position:relative;z-index:10}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent)}
.htitle{font-size:18px;font-weight:800;letter-spacing:-.4px}
.hsub{font-size:11px;opacity:.35;margin-top:2px;font-weight:500;letter-spacing:.3px}
.hright{display:flex;gap:8px;align-items:center}
.ibtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:var(--rad-sm);
  width:40px;height:40px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .25s var(--transition);position:relative;overflow:hidden}
.ibtn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.1),transparent);
  opacity:0;transition:opacity .25s}
.ibtn:hover::before{opacity:1}
.ibtn:active{transform:scale(.88);background:rgba(255,255,255,.12)}
.opill{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:10px;font-weight:700;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);letter-spacing:.3px;text-transform:uppercase}
.opill.on{color:#6ee7b7}.opill.off{color:#fca5a5}
.odot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.odot.p{animation:breathe 2.5s ease-in-out infinite}

/* STATS BAR */
.stats{display:grid;grid-template-columns:repeat(4,1fr);background:var(--card);
  border-bottom:1px solid var(--border);flex-shrink:0}
.stat{padding:16px 4px;text-align:center;border-left:1px solid var(--border);cursor:pointer;
  transition:all .25s var(--transition);position:relative}
.stat:last-child{border-left:none}
.stat.act{background:var(--bg)}
.stat.act::after{content:'';position:absolute;bottom:0;left:15%;right:15%;height:2.5px;border-radius:2px}
.st.act::after{background:var(--pri)}.sg.act::after{background:var(--g)}.sy.act::after{background:var(--y)}.sr.act::after{background:var(--r)}
.sn{font-size:24px;font-weight:900;line-height:1;letter-spacing:-.5px}
.sl{font-size:9px;color:var(--muted);margin-top:5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.st .sn{color:var(--pri)}.sg .sn{color:var(--g)}.sy .sn{color:var(--y)}.sr .sn{color:var(--r)}

/* TOOLBAR */
.toolbar{padding:14px 16px;display:flex;gap:10px;flex-shrink:0;background:var(--card);border-bottom:1px solid var(--border)}
.si{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rad-sm);padding:12px 16px;
  color:var(--text);font-family:inherit;font-size:14px;direction:rtl;outline:none;transition:all .25s var(--transition)}
.si:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 4px var(--accent-glow)}
.si::placeholder{color:var(--muted2)}

/* PATIENT CARD - Premium depth */
.pc{background:var(--card);border:1px solid var(--border);border-radius:var(--rad);padding:18px;
  display:flex;align-items:center;gap:14px;margin-bottom:10px;cursor:pointer;
  transition:transform .15s var(--transition),box-shadow .2s ease,border-color .2s ease;
  position:relative;overflow:hidden;box-shadow:var(--shadow);transform:translateZ(0)}
.pc:hover{box-shadow:var(--shadow-md);border-color:var(--border2)}
.pc:active{transform:scale(.975);box-shadow:var(--shadow-xs)}
.pstripe{position:absolute;right:0;top:0;bottom:0;width:4px;border-radius:0 4px 4px 0}
.pbadge{width:52px;height:52px;border-radius:16px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;flex-shrink:0;border:2px solid;font-weight:900;
  transition:transform .3s var(--transition)}
.pc:active .pbadge{transform:scale(.9)}
.pn{font-size:14px;font-weight:700;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.pm{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:10px;color:var(--muted);background:var(--bg);border:1px solid var(--border);
  border-radius:var(--rad-xs);padding:3px 10px;font-weight:600;letter-spacing:.1px}
.pw{font-size:13px;font-weight:800;color:var(--accent);flex-shrink:0;
  background:var(--accent-glow);padding:5px 12px;border-radius:var(--rad-xs);letter-spacing:.2px}
.c1 .pstripe{background:var(--g)}.c1 .pbadge{color:var(--g);background:var(--gbg);border-color:var(--gb)}
.c2 .pstripe{background:var(--y)}.c2 .pbadge{color:var(--y);background:var(--ybg);border-color:var(--yb)}
.c3 .pstripe,.c4 .pstripe{background:var(--r)}.c3 .pbadge,.c4 .pbadge{color:var(--r);background:var(--rbg);border-color:var(--rb)}

/* FORMS - Refined */
.fg{margin-bottom:20px}
.fl{font-size:11px;color:var(--muted);display:block;margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.fi{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:var(--rad-sm);
  padding:14px 16px;color:var(--text);font-family:inherit;font-size:15px;direction:rtl;outline:none;
  transition:all .25s var(--transition)}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-glow)}
.fi::placeholder{color:var(--muted2)}
.cpick{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.co{border:2px solid var(--border);border-radius:16px;padding:16px 4px;text-align:center;
  cursor:pointer;background:var(--card);transition:all .25s var(--transition)}
.co:active{transform:scale(.9)}
.co .cn{font-size:24px;font-weight:900;color:var(--muted)}
.co .cl{font-size:10px;color:var(--muted);margin-top:4px;font-weight:700}
.co.s1{border-color:var(--g);background:var(--gbg);box-shadow:0 0 12px var(--g-glow)}.co.s1 .cn{color:var(--g)}.co.s1 .cl{color:var(--g)}
.co.s2{border-color:var(--y);background:var(--ybg);box-shadow:0 0 12px var(--y-glow)}.co.s2 .cn{color:var(--y)}.co.s2 .cl{color:var(--y)}
.co.s3,.co.s4{border-color:var(--r);background:var(--rbg);box-shadow:0 0 12px var(--r-glow)}.co.s3 .cn,.co.s4 .cn{color:var(--r)}.co.s3 .cl,.co.s4 .cl{color:var(--r)}

/* BUTTONS - Premium */
.btn{width:100%;background:linear-gradient(135deg,var(--accent) 0%,#4f46e5 100%);color:#fff;border:none;
  border-radius:16px;padding:16px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;
  transition:all .25s var(--transition);display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 16px rgba(99,102,241,.25);position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
  opacity:0;transition:opacity .25s}
.btn:hover::before{opacity:1}
.btn:active{transform:scale(.97);box-shadow:0 2px 8px rgba(99,102,241,.2)}
.btn:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;transform:none}
.btn-g{background:var(--card);color:var(--text);border:1.5px solid var(--border);box-shadow:var(--shadow)}
.btn-g::before{display:none}
.btn-d{background:var(--rbg);color:var(--r);border:1.5px solid var(--rb);padding:15px 20px;width:auto;box-shadow:none}
.btn-d::before{display:none}

/* PIN SCREEN - Premium */
.pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;
  padding:20px;background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);position:relative}
.pin-screen::before{content:'';position:absolute;top:15%;left:50%;width:300px;height:300px;
  background:radial-gradient(circle,var(--accent-glow),transparent 70%);transform:translateX(-50%);
  pointer-events:none;opacity:.5}
.pin-logo{width:72px;height:72px;border-radius:22px;
  background:linear-gradient(135deg,var(--pri),var(--pri2));
  display:flex;align-items:center;justify-content:center;margin-bottom:24px;
  box-shadow:0 8px 32px rgba(10,10,15,.3),0 0 0 1px rgba(255,255,255,.05) inset;
  animation:lockPulse 3s ease-in-out infinite}
.pin-label{font-size:14px;color:var(--muted);font-weight:600;margin-bottom:32px;letter-spacing:.3px}
.pdisplay{display:flex;gap:20px;justify-content:center;margin-bottom:40px}
.pdot2{width:15px;height:15px;border-radius:50%;border:2.5px solid var(--border);background:transparent;
  transition:all .35s cubic-bezier(.34,1.56,.64,1)}
.pdot2.f{background:var(--accent);border-color:var(--accent);transform:scale(1.15);
  box-shadow:0 0 12px var(--accent-glow)}
.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:270px;margin:0 auto;width:100%}
.pkey{background:rgba(255,255,255,.8);border:none;border-radius:50%;width:72px;height:72px;margin:0 auto;
  text-align:center;font-size:26px;font-weight:600;cursor:pointer;transition:all .2s var(--transition);
  color:var(--text);font-family:inherit;display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow);backdrop-filter:blur(10px)}
.pkey:active{background:var(--bg2);transform:scale(.85);box-shadow:none}
.pkey.del{font-size:14px;color:var(--muted);background:transparent;box-shadow:none}
.pin-error{color:var(--r);font-weight:600;margin-bottom:16px;font-size:13px;animation:shakeX .5s ease}

/* UNIT CARDS - Premium depth */
.ucard{background:var(--card);border:1px solid var(--border);border-radius:var(--rad);
  overflow:hidden;box-shadow:var(--shadow);margin-bottom:12px;transition:all .3s var(--transition)}
.ucard:hover{box-shadow:var(--shadow-md)}
.ucard:active{transform:scale(.98)}
.uhdr{background:linear-gradient(135deg,var(--pri) 0%,var(--pri2) 100%);
  padding:16px 20px;color:#fff;font-weight:800;font-size:14px;
  display:flex;justify-content:space-between;align-items:center;letter-spacing:-.2px;
  position:relative;overflow:hidden}
.uhdr::before{content:'';position:absolute;top:-50%;right:-30%;width:120px;height:120px;
  background:radial-gradient(circle,rgba(99,102,241,.15),transparent 70%);pointer-events:none}
.uwrap{display:grid;grid-template-columns:1fr 1fr}
.ubtn{padding:22px 12px;text-align:center;cursor:pointer;transition:all .25s var(--transition);border:none;background:transparent}
.ubtn:active{background:var(--bg)}
.ubtn.male{border-left:1px solid var(--border)}
.uico{margin-bottom:10px;color:var(--muted);opacity:.5}
.uname{font-size:13px;font-weight:800;color:var(--text);letter-spacing:-.1px}
.ucnt{display:inline-block;margin-top:10px;padding:5px 16px;border-radius:20px;font-size:11px;font-weight:700}
.male .ucnt{background:var(--accent-glow);color:var(--accent);border:1px solid rgba(99,102,241,.12)}
.female .ucnt{background:#fdf2f8;color:#be185d;border:1px solid #fce7f3}

/* SCROLLABLE AREAS */
.slist{flex:1;overflow-y:auto;padding:12px 16px 100px;-webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;transform:translateZ(0)}
.slist::-webkit-scrollbar{display:none}
.sp{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sp::-webkit-scrollbar{display:none}

/* INFO ROW */
.ir{display:flex;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);font-size:14px;align-items:center}
.ir:last-child{border-bottom:none;margin-bottom:8px}
.ik{color:var(--muted);font-weight:600}.iv{font-weight:700;font-variant-numeric:tabular-nums}

/* OCR */
.ocr-zone{border:2px dashed var(--border);border-radius:var(--rad);padding:48px 20px;text-align:center;
  cursor:pointer;transition:all .3s var(--transition);background:var(--card)}
.ocr-zone:hover{border-color:var(--accent);background:var(--accent-glow)}
.orow{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;
  margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);
  transition:all .25s var(--transition)}
.orow:hover{box-shadow:var(--shadow-md)}
.ochk{width:26px;height:26px;border-radius:var(--rad-xs);border:2px solid var(--accent);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;
  transition:all .25s var(--transition)}
.ochk.on{background:var(--accent);box-shadow:0 0 10px var(--accent-glow)}

/* LOADER */
.loader{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
.empty{text-align:center;padding:80px 20px;color:var(--muted);font-size:14px;font-weight:500}
.empty svg{opacity:.25;margin-bottom:16px}

/* TOAST - Premium */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(80px);
  padding:14px 28px;border-radius:16px;font-size:14px;font-weight:700;z-index:1000;
  white-space:nowrap;transition:transform .4s var(--transition);
  pointer-events:none;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:rgba(10,10,15,.9);color:#fff;box-shadow:var(--shadow-lg)}
.toast.err{background:rgba(220,38,38,.95);color:#fff;box-shadow:0 8px 32px rgba(220,38,38,.25)}
.toast.warn{background:rgba(217,119,6,.95);color:#fff;box-shadow:0 8px 32px rgba(217,119,6,.25)}

/* OFFLINE BAR */
.offbar{background:var(--rbg);border-bottom:1px solid var(--rb);color:var(--r);
  text-align:center;font-size:12px;font-weight:700;padding:10px;flex-shrink:0;display:none}
.offbar.show{display:block}

/* ADMIN TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);flex-shrink:0;background:var(--card)}
.tab{flex:1;padding:16px 4px;text-align:center;font-size:13px;font-weight:700;color:var(--muted);
  cursor:pointer;border-bottom:2.5px solid transparent;transition:all .25s var(--transition);margin-bottom:-2px}
.tab.act{color:var(--accent);border-bottom-color:var(--accent)}

/* INSTALL BANNER */
.ibanner{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
  background:linear-gradient(135deg,var(--pri),var(--pri2));
  padding:18px 20px calc(18px + env(safe-area-inset-bottom));
  display:flex;align-items:center;gap:14px;z-index:200;
  transform:translateY(100%);transition:transform .5s var(--transition);
  box-shadow:0 -8px 32px rgba(0,0,0,.2);border-top:1px solid rgba(255,255,255,.05)}
.ibanner.show{transform:translateY(0)}
.ibanner-text strong{display:block;font-size:14px;font-weight:800;color:#fff}
.ibanner-text span{font-size:12px;color:#94a3b8}
.ibanner-btn{background:#fff;color:var(--pri);border:none;border-radius:var(--rad-sm);
  padding:12px 22px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,.1);transition:all .25s var(--transition)}
.ibanner-btn:active{transform:scale(.95)}
.ibanner-x{background:none;border:none;color:rgba(255,255,255,.3);font-size:20px;cursor:pointer;padding:4px;flex-shrink:0}

/* SESSION TIMEOUT OVERLAY */
.timeout-overlay{position:fixed;inset:0;background:rgba(10,10,15,.85);backdrop-filter:blur(20px);
  z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;
  animation:fadeUp .4s var(--transition)}
.timeout-card{background:var(--card);border-radius:var(--rad);padding:40px 32px;text-align:center;
  max-width:320px;width:90%;box-shadow:var(--shadow-lg)}

/* PRIVACY SHIELD */
.civil-masked{font-variant-numeric:tabular-nums;letter-spacing:1px}

/* SCROLL FADE */
.scroll-fade{position:relative}
.scroll-fade::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;
  background:linear-gradient(transparent,var(--bg));pointer-events:none;z-index:5}

/* TOTAL CARD - Home */
.total-card{background:linear-gradient(135deg,var(--pri) 0%,var(--pri2) 40%,var(--pri3) 100%);
  border-radius:var(--rad);padding:24px;margin-bottom:20px;color:#fff;position:relative;overflow:hidden;
  box-shadow:var(--shadow-lg)}
.total-card::before{content:'';position:absolute;top:-40%;right:-20%;width:200px;height:200px;
  background:radial-gradient(circle,rgba(99,102,241,.2),transparent 70%);pointer-events:none}
.total-card::after{content:'';position:absolute;bottom:-30%;left:-10%;width:150px;height:150px;
  background:radial-gradient(circle,rgba(99,102,241,.1),transparent 70%);pointer-events:none}

/* PRIVACY BANNER */
.privacy-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;
  font-size:10px;font-weight:700;background:rgba(5,150,105,.06);color:var(--g);border:1px solid rgba(5,150,105,.12);
  letter-spacing:.5px;text-transform:uppercase}

/* CONFIRM DIALOG */
.confirm-overlay{position:fixed;inset:0;background:rgba(10,10,15,.6);backdrop-filter:blur(12px);
  z-index:400;display:flex;align-items:center;justify-content:center;animation:fadeUp .3s var(--transition)}
.confirm-card{background:var(--card);border-radius:var(--rad);padding:32px 24px;text-align:center;
  max-width:320px;width:90%;box-shadow:var(--shadow-lg)}
</style>

// ── PRIVACY: SHA-256 PIN HASHING ────────────────────────────────────
async function hashPin(pin) {
  const encoder = new TextEncoder();
  const data = encoder.encode(pin + "MedEvac_Salt_2024");
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

// ── PRIVACY: DATA MASKING ───────────────────────────────────────────
function maskCivilId(civil) {
  if (!civil || civil.length < 6) return civil || "";
  return civil.slice(0, 3) + "\u2022".repeat(civil.length - 6) + civil.slice(-3);
}

      </div>

      root.innerHTML = "";

}

// ── FIREBASE HELPERS ─────────────────────────────────────────────────
async function seedData() {
  const s1 = await get(ref(db,"patients/E_M"));
  if (!s1.exists()) for (const p of SEED_E_M) await push(ref(db,"patients/E_M"),{...p,ts:Date.now()});
  const s2 = await get(ref(db,"patients/E_F"));
  if (!s2.exists()) for (const p of SEED_E_F) await push(ref(db,"patients/E_F"),{...p,ts:Date.now()});
  const sp = await get(ref(db,"pins"));
  if (!sp.exists()) await set(ref(db,"pins"),DEFAULT_PINS);
}

function listenUnit(uid) {
  if (S.unsub) { off(ref(db,"patients/" + S.unit)); }
  S.unit = uid;
  S.patients = [];
  onValue(ref(db,"patients/" + uid), snap => {
    const d = snap.val()||{};
    S.patients = Object.entries(d).map(([k,v])=>({...v,_k:k}));
    if (S.screen==="ward") render();
    if (S._backupPending && S.patients.length > 0) {
      S._backupPending = false;
      emergencyBackupPNG();
    }
  });
}

function listenAll() {
  onValue(ref(db,"patients"), snap => {
    S.allData = snap.val()||{};
    if (S.screen==="admin") render();
  });
  onValue(ref(db,"pins"), snap => {
    if (snap.exists()) S.pins = {...DEFAULT_PINS,...snap.val()};
  });
}

async function fbSave(uid, key, data) { await set(ref(db,"patients/" + uid + "/" + key),{...data,ts:Date.now()}); }
async function fbAdd(uid, data)        { await push(ref(db,"patients/" + uid),{...data,ts:Date.now()}); }
async function fbDel(uid, key)         { await remove(ref(db,"patients/" + uid + "/" + key)); }
async function fbSetPin(uid, pin)      { await set(ref(db,"pins/" + uid),pin); }

function toast(msg,type="ok") {
  const t = document.getElementById("toast");
  t.className="toast " + type; t.textContent=msg;
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add("show")));
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove("show"),2800);
}

function filtered() {
  let list=[...S.patients];
  if(S.filter==="1")list=list.filter(p=>p.code==1);
  else if(S.filter==="2")list=list.filter(p=>p.code==2);
  else if(S.filter==="r")list=list.filter(p=>p.code>=3);
  if(S.search){const q=S.search.toLowerCase();list=list.filter(p=>(p.name||"").toLowerCase().includes(q)||(p.civil||"").includes(q)||(p.ward||"").toLowerCase().includes(q));}
  return list.sort((a,b)=>b.code-a.code);
}

// ── EMERGENCY BACKUP PNG ─────────────────────────────────────────────
function emergencyBackupPNG() {
  if (!S.unit) return;
  const patients = [...S.patients].sort((a,b) => b.code - a.code);
  if (!patients.length) return;

  const cols = ["#","Name","Civil ID","Nationality","Ward","Code","Notes"];
  const rows = patients.map((p,i) => [
    String(i+1), p.name||"", p.civil||"", p.nat||"", p.ward||"", String(p.code||""), p.notes||""
  ]);

  const cv = document.createElement("canvas");
  const ctx = cv.getContext("2d");
  const fs = 14, pad = 10, rowH = fs + pad * 2, hdrH = rowH + 4;
  const colW = [40, 180, 100, 80, 80, 50, 160];
  const totalW = colW.reduce((a,b) => a+b, 0) + 20;
  const titleH = 50;
  const totalH = titleH + hdrH + rows.length * rowH + 20;
  cv.width = totalW; cv.height = totalH;

  ctx.fillStyle = "#0a0a0f"; ctx.fillRect(0, 0, totalW, totalH);

  ctx.fillStyle = "#818cf8"; ctx.font = "bold 18px Inter, sans-serif"; ctx.textAlign = "right"; ctx.textBaseline = "middle";
  const isF = S.unit.endsWith("_F");
  const unitLabel = "Unit " + S.unit[0] + " \u2014 " + (isF ? "Female" : "Male");
  const now = new Date();
  const dateStr = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0") + " " + String(now.getHours()).padStart(2,"0") + ":" + String(now.getMinutes()).padStart(2,"0");
  ctx.fillText(unitLabel, totalW - 10, 20);
  ctx.fillStyle = "#94a3b8"; ctx.font = "12px Inter, sans-serif";
  ctx.fillText(dateStr, totalW - 10, 40);

  let y = titleH;
  const codeColors = {1:"#059669",2:"#d97706",3:"#dc2626",4:"#dc2626"};

  ctx.fillStyle = "#1e293b"; ctx.fillRect(10, y, totalW - 20, hdrH);
  ctx.fillStyle = "#93c5fd"; ctx.font = "bold " + fs + "px Inter, sans-serif"; ctx.textAlign = "right"; ctx.textBaseline = "middle";
  let x = totalW - 10;
  cols.forEach((c, i) => { ctx.fillText(c, x - 4, y + hdrH/2); x -= colW[i]; });
  y += hdrH;

  rows.forEach((row, ri) => {
    ctx.fillStyle = ri % 2 === 0 ? "#0f0f18" : "#14141e";
    ctx.fillRect(10, y, totalW - 20, rowH);
    ctx.font = fs + "px Inter, sans-serif"; ctx.textAlign = "right"; ctx.textBaseline = "middle";
    x = totalW - 10;
    row.forEach((cell, ci) => {
      if (ci === 5) ctx.fillStyle = codeColors[Number(cell)] || "#e2e8f0";
      else ctx.fillStyle = "#e2e8f0";
      const maxW = colW[ci] - 8;
      let txt = cell;
      while (ctx.measureText(txt).width > maxW && txt.length > 1) txt = txt.slice(0, -1) + "\u2026";
      ctx.fillText(txt, x - 4, y + rowH/2);
      x -= colW[ci];
    });
    y += rowH;
  });

  const dataUrl = cv.toDataURL("image/png");
  const a = document.createElement("a");
  a.href = dataUrl;
  a.download = "MedEvac_Unit" + S.unit[0] + "_" + (S.unit.endsWith("_F")?"F":"M") + "_" + dateStr.replace(/[: ]/g,"_") + ".png";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

            '<button class="btn btn-g" id="ocr-selall">Select All</button>' +
            '<button class="btn" id="ocr-import" ' + (S.ocrSel.length===0?"disabled":"") + '>' +
              icoPlus + ' Import ' + S.ocrSel.length + ' patients' +
            '</button>' +
          '</div>' +
        '</div>' : '');
  }

  if (S.adminTab==="pins") {
    const unitLabels = {
      A_M:"Unit A Male",A_F:"Unit A Female",
      B_M:"Unit B Male",B_F:"Unit B Female",
      C_M:"Unit C Male",C_F:"Unit C Female",
      D_M:"Unit D Male",D_F:"Unit D Female",
      E_M:"Unit E Male",E_F:"Unit E Female",
      ADMIN:"Administrator"
    };
    content =
      '<div style="background:var(--rbg);border:1px solid var(--rb);border-radius:var(--rad-sm);padding:14px 16px;margin-bottom:18px;font-size:13px;color:var(--r);font-weight:600;display:flex;align-items:center;gap:8px">' +
        icoLock + ' Keep these PINs strictly confidential' +
      '</div>' +
      Object.entries(unitLabels).map(([uid,label]) =>
        '<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--rad-sm);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)">' +
          '<div style="flex:1;font-weight:700;font-size:14px">' + label + '</div>' +
          '<input class="fi" id="pin-' + uid + '" value="' + (S.pins[uid]||"") + '" maxlength="6" type="password" style="width:90px;text-align:center;font-size:18px;font-weight:900;letter-spacing:4px" autocomplete="off">' +
          '<button class="btn" style="width:auto;padding:11px 16px" data-savepin="' + uid + '">' + icoSave + '</button>' +
        '</div>'
      ).join('');
  }

  return '<div class="screen">' +
    '<div class="hdr">' +
      '<button class="ibtn" id="btn-back">' + icoBack + '</button>' +
      '<div style="flex:1;text-align:center"><div class="htitle">Admin Panel</div></div>' +
      '<div style="width:40px"></div>' +
    '</div>' +
    '<div class="tabs">' +
      tabs.map(t => '<div class="tab ' + (S.adminTab===t.id?"act":"") + '" data-tab="' + t.id + '">' + t.label + '</div>').join('') +
    '</div>' +
    '<div class="sp" style="padding:14px 14px 80px">' + content + '</div>' +
  '</div>';
}

// ── BIND EVENTS ──────────────────────────────────────────────────────
function bindEvents() {
  // Unit buttons
  document.querySelectorAll("[data-unit]").forEach(btn => {
    btn.addEventListener("click", () => {
      const uid = btn.dataset.unit;
      S.pinTarget = uid;
      S.pinVal = "";
      S.pinError = false;
      S.screen = "pin";
      render();
    });
  });

  // Admin button
  const ba = el("btn-admin");
  if (ba) ba.addEventListener("click", () => {
    S.pinTarget = "ADMIN"; S.pinVal = ""; S.pinError=false; S.screen="pin"; render();
  });

  // Back button
  const bb = el("btn-back");
  if (bb) bb.addEventListener("click", () => {
    if (S.screen==="ward"||S.screen==="admin") { S.screen="home"; S.showCivil={}; render(); }
    else if (S.screen==="detail"||S.screen==="add") { S.screen="ward"; render(); }
    else if (S.screen==="pin") { S.screen="home"; render(); }
  });

  // Backup button
  const bkup = el("btn-backup");
  if (bkup) bkup.addEventListener("click", () => emergencyBackupPNG());

  // Toggle civil ID visibility
  const tcivil = el("toggle-civil");
  if (tcivil && S.editP) tcivil.addEventListener("click", (e) => {
    e.stopPropagation();
    const k = S.editP._k;
    S.showCivil[k] = !S.showCivil[k];
    render();
  });

  // PIN pad
  document.querySelectorAll("[data-pin]").forEach(k => {
    k.addEventListener("click", () => {
      const v = k.dataset.pin;
      if (v==="\u232b") { S.pinVal=S.pinVal.slice(0,-1); }
      else if (S.pinVal.length<6) { S.pinVal+=v; }
      S.pinError=false;
      if (S.pinVal.length===4||(S.pins[S.pinTarget] && S.pins[S.pinTarget].length>4 && S.pinVal.length===6)) checkPin();
      else render();
    });
  });

  // Filters
  document.querySelectorAll("[data-filt]").forEach(f => {
    f.addEventListener("click", () => { S.filter=f.dataset.filt; render(); });
  });

  // Search
  const si = el("search-inp");
  if (si) si.addEventListener("input", e => { S.search=e.target.value; render(); });

  // Patient card tap
  document.querySelectorAll(".pc").forEach(c => {
    c.addEventListener("click", () => {
      const p = S.patients.find(x=>x._k===c.dataset.key);
      if (p) { S.editP=p; S.editCode=p.code; S.screen="detail"; render(); }
    });
  });

  // Code picker (edit)
  document.querySelectorAll("[data-cpick='e']").forEach(c => {
    c.addEventListener("click", () => { S.editCode=parseInt(c.dataset.code); render(); });
  });

  // Code picker (add)
  document.querySelectorAll("[data-cpick='a']").forEach(c => {
    c.addEventListener("click", () => { S.addCode=parseInt(c.dataset.code); render(); });
  });

  // Save edit
  const bs = el("btn-save");
  if (bs) bs.addEventListener("click", async () => {
    bs.disabled=true;
    const p = S.editP;
    const updated = {...p, ward:el("e-ward").value.trim(), code:S.editCode, notes:el("e-notes").value.trim()};
    try { await fbSave(S.unit, p._k, updated); toast("Saved successfully"); S.screen="ward"; render(); }
    catch(e) { toast("Save failed","err"); bs.disabled=false; }
  });

  // Delete with confirm dialog
  const bd = el("btn-delete");
  if (bd) bd.addEventListener("click", async () => {
    const confirmed = await confirmDialog(
      "Delete Patient?",
      "This will permanently remove \"" + S.editP.name + "\" from the registry. This action cannot be undone."
    );
    if (!confirmed) return;
    try { await fbDel(S.unit, S.editP._k); toast("Patient deleted"); S.screen="ward"; render(); }
    catch(e) { toast("Delete failed","err"); }
  });

  // Add
  const ba2 = el("btn-add");
  if (ba2) ba2.addEventListener("click", () => { S.addCode=null; S.screen="add"; render(); });

  // Save add
  const bsa = el("btn-save-add");
  if (bsa) bsa.addEventListener("click", async () => {
    const name=el("a-name").value.trim(), civil=el("a-civil").value.trim(),
          ward=el("a-ward").value.trim(), nat=el("a-nat").value.trim(),
          notes=el("a-notes").value.trim();
    if (!name||!civil||!ward||!S.addCode) { toast("Please fill all required fields","err"); return; }
    bsa.disabled=true;
    try {
      await fbAdd(S.unit,{name,civil,nat,ward,code:S.addCode,notes});
      toast("Patient added successfully"); S.screen="ward"; render();
    } catch(e) { toast("Failed to add","err"); bsa.disabled=false; }
  });

  // Admin tabs
  document.querySelectorAll("[data-tab]").forEach(t => {
    t.addEventListener("click", () => { S.adminTab=t.dataset.tab; render(); });
  });

  // OCR zone
  const oz = el("ocr-zone");
  if (oz) oz.addEventListener("click", () => { const f = el("ocr-file"); if(f) f.click(); });
  const of_ = el("ocr-file");
  if (of_) of_.addEventListener("change", handleOCRFile);

  // OCR checkboxes
  document.querySelectorAll("[data-ocr]").forEach(c => {
    c.addEventListener("click", () => {
      const i=parseInt(c.dataset.ocr);
      if (S.ocrSel.includes(i)) S.ocrSel=S.ocrSel.filter(x=>x!==i);
      else S.ocrSel.push(i);
      render();
    });
  });

  // OCR select all
  const osa = el("ocr-selall");
  if (osa) osa.addEventListener("click", () => {
    S.ocrSel = S.ocrSel.length===S.ocrResults.length ? [] : S.ocrResults.map((_,i)=>i);
    render();
  });

  // OCR import
  const oi = el("ocr-import");
  if (oi) oi.addEventListener("click", handleOCRImport);

  // Save pins
  document.querySelectorAll("[data-savepin]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const uid=btn.dataset.savepin, val=el("pin-" + uid);
      const pinVal = val ? val.value.trim() : "";
      if (!pinVal||pinVal.length<4) { toast("PIN must be at least 4 digits","err"); return; }
      try { await fbSetPin(uid,pinVal); S.pins[uid]=pinVal; toast("PIN saved securely"); }
      catch(e) { toast("Failed to save PIN","err"); }
    });
  });
}

// ── PIN CHECK ────────────────────────────────────────────────────────
function checkPin() {
  const correct = S.pins[S.pinTarget] || DEFAULT_PINS[S.pinTarget];
  if (S.pinVal === correct) {
    if (S.pinTarget === "ADMIN") {
      S.screen = "admin";
      S.adminTab = "overview";
      listenAll();
    } else {
      S.screen = "ward";
      S.filter = "all";
      S.search = "";
      S._backupPending = true;
      listenUnit(S.pinTarget);
    }
    render();
  } else {
    S.pinError = true;
    S.pinVal = "";
    render();
  }
}

const UNITS_META = {
  A_M:{label:"Unit A",sub:"Male"}, A_F:{label:"Unit A",sub:"Female"},
  B_M:{label:"Unit B",sub:"Male"}, B_F:{label:"Unit B",sub:"Female"},
  C_M:{label:"Unit C",sub:"Male"}, C_F:{label:"Unit C",sub:"Female"},
  D_M:{label:"Unit D",sub:"Male"}, D_F:{label:"Unit D",sub:"Female"},
  E_M:{label:"Unit E",sub:"Male"}, E_F:{label:"Unit E",sub:"Female"},
};

// ── OCR ──────────────────────────────────────────────────────────────
function handleOCRFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    const b64 = ev.target.result.split(",")[1];
    S.ocrImg = ev.target.result;
    S.ocrB64 = b64;
    S.ocrResults = [];
    S.ocrSel = [];
    S.ocrLoading = true;
    render();
    try {
      const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + GEMINI,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          contents:[{parts:[
            {inline_data:{mime_type:file.type,data:b64}},
            {text:"Extract ALL patient records from this image. Return ONLY a JSON array, no markdown, no explanation. Each object must have exactly these fields:\n{\"name\":\"full Arabic name\",\"civil\":\"civil ID number as string\",\"nat\":\"nationality in Arabic\",\"ward\":\"ward/bed like W21R8\",\"code\":number 1-4,\"notes\":\"\"}\nCode mapping: 1=green, 2=yellow, 3=red, 4=critical\nIf a field is unclear write empty string. Return only the JSON array."}
          ]}]
        })
      });
      const data = await res.json();
      const text = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text || "[]";
      const clean = text.replace(/```json|```/g,"").trim();
      S.ocrResults = JSON.parse(clean);
      S.ocrSel = S.ocrResults.map((_,i)=>i);
    } catch(err) {
      toast("Analysis failed \u2014 please try again","err");
      S.ocrResults = [];
    }
    S.ocrLoading = false;
    render();
  };
  reader.readAsDataURL(file);
}

async function handleOCRImport() {
  const unitEl = el("ocr-unit");
  const uid = unitEl ? unitEl.value : null;
  if (!uid||S.ocrSel.length===0) return;
  const btn = el("ocr-import");
  btn.disabled = true;
  btn.textContent = "Importing...";
  try {
    for (const i of S.ocrSel) {
      const p = S.ocrResults[i];
      await fbAdd(uid, {name:p.name||"",civil:p.civil||"",nat:p.nat||"",ward:p.ward||"",code:parseInt(p.code)||2,notes:p.notes||""});
    }
    toast("Imported " + S.ocrSel.length + " patients successfully");
    S.ocrResults=[]; S.ocrSel=[]; S.ocrImg=null;
    render();
  } catch(e) {
    toast("Import failed","err");
    btn.disabled=false;
  }
}

// ── INSTALL PROMPT ───────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault(); deferredPrompt=e;
  if (!localStorage.getItem("mak_installed")) {
    setTimeout(() => { const ib = el("ibanner"); if(ib) ib.classList.add("show"); },3000);
  }
});
const ibannerBtn = el("ibanner-btn");
if (ibannerBtn) ibannerBtn.addEventListener("click", () => {
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(()=>dismissInstall()); }
  else if (/iphone|ipad|ipod/i.test(navigator.userAgent)) {
    alert("iPhone:\n1. Tap the Share button\n2. Select \"Add to Home Screen\"\n3. Tap \"Add\"");
    dismissInstall();
  }
});
window.dismissInstall = () => {
  const ib = el("ibanner"); if(ib) ib.classList.remove("show");
  localStorage.setItem("mak_installed","1");
};

// ── CONNECTIVITY ─────────────────────────────────────────────────────
window.addEventListener("online",  () => { S.online=true;  render(); });
window.addEventListener("offline", () => { S.online=false; render(); });

// ── PRIVACY: Clear sensitive data on page unload ─────────────────────
window.addEventListener("beforeunload", () => {
  S.patients = [];
  S.allData = {};
  S.editP = null;
  S.showCivil = {};
});

// ── BOOT ─────────────────────────────────────────────────────────────
async function boot() {
  listenAll();
  await seedData();
  S.screen = "home";
  render();
}
boot();
