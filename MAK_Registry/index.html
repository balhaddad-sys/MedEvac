<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MedEvac">
<meta name="theme-color" content="#0f172a">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.firebaseio.com https://*.firebasedatabase.app https://*.googleapis.com https://*.gstatic.com https://fonts.googleapis.com; frame-src 'self' https://*.firebasedatabase.app https://*.firebaseio.com; script-src 'self' https://*.gstatic.com https://*.firebasedatabase.app; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; connect-src 'self' https://*.firebaseio.com https://*.firebasedatabase.app wss://*.firebasedatabase.app https://*.googleapis.com https://*.gstatic.com https://generativelanguage.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://*.cloudfunctions.net; font-src https://fonts.gstatic.com">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<title>MedEvac</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f1f5f9;--bg2:#e2e8f0;--card:#fff;
  --pri:#0f172a;--pri2:#1e293b;--pri3:#334155;
  --acc:#0ea5e9;--acc2:#38bdf8;--acc-bg:rgba(14,165,233,.08);--acc-bd:rgba(14,165,233,.2);
  --txt:#0f172a;--muted:#64748b;--muted2:#94a3b8;
  --border:#e2e8f0;--border2:#cbd5e1;
  --g:#10b981;--gbg:#ecfdf5;--gbd:#a7f3d0;
  --y:#f59e0b;--ybg:#fffbeb;--ybd:#fcd34d;
  --r:#ef4444;--rbg:#fef2f2;--rbd:#fca5a5;
  --radius:16px;--radius-sm:12px;--radius-xs:8px;
  --shadow:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
  --shadow-md:0 4px 6px rgba(15,23,42,.05),0 10px 15px rgba(15,23,42,.06);
  --shadow-lg:0 10px 25px rgba(15,23,42,.08),0 20px 50px rgba(15,23,42,.06);
}
html,body{height:100%;background:var(--bg);color:var(--txt);
  font-family:'Inter',system-ui,sans-serif;direction:rtl;overflow:hidden;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:var(--bg);overflow:hidden}
.screen{display:flex;flex-direction:column;height:100%;opacity:0;animation:fadeIn .25s ease forwards}
@keyframes fadeIn{to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes pulse2{0%,100%{opacity:.6}50%{opacity:1}}

.hdr{background:var(--pri);padding:max(env(safe-area-inset-top),12px) 16px 14px;color:#fff;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-c{flex:1;min-width:0}
.hdr h1{font-size:16px;font-weight:800;letter-spacing:-.3px}
.hdr p{font-size:10px;opacity:.4;font-weight:500;margin-top:1px}
.hbtn{width:36px;height:36px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,.15)}
.badge{font-size:9px;font-weight:700;padding:4px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;text-transform:uppercase;letter-spacing:.5px}
.badge-on{background:rgba(16,185,129,.15);color:#34d399}
.badge-off{background:rgba(239,68,68,.15);color:#f87171}
.ldot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse2 2s infinite}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.stat{padding:12px 4px;text-align:center;cursor:pointer;position:relative}
.stat:not(:last-child){border-left:1px solid var(--border)}
.stat.act{background:var(--bg)}
.stat.act::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;border-radius:1px}
.stat .n{font-size:20px;font-weight:900;line-height:1}
.stat .l{font-size:8px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-top:3px}
.ca .n{color:var(--txt)}.ca.act::after{background:var(--txt)}
.cg .n{color:var(--g)}.cg.act::after{background:var(--g)}
.cy .n{color:var(--y)}.cy.act::after{background:var(--y)}
.cr .n{color:var(--r)}.cr.act::after{background:var(--r)}

.sbar{padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.sinp{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-family:inherit;font-size:14px;color:var(--txt);outline:none;direction:rtl}
.sinp:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-bg)}
.sinp::placeholder{color:var(--muted2)}
.abtn{width:40px;height:40px;border-radius:var(--radius-sm);border:none;background:var(--acc);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.abtn:active{opacity:.8}

.plist{flex:1;overflow-y:auto;padding:8px 12px 100px;-webkit-overflow-scrolling:touch}
.plist::-webkit-scrollbar{display:none}

.pc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.pc:active{transform:scale(.98)}
.ps{position:absolute;right:0;top:0;bottom:0;width:3px}
.pb{width:44px;height:44px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;font-weight:900;border:1.5px solid}
.pb .bn{font-size:18px;line-height:1}
.pb .bt{font-size:7px;text-transform:uppercase;margin-top:1px}
.pi{flex:1;min-width:0}
.pn{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.pm{display:flex;gap:4px;flex-wrap:wrap}
.ch{font-size:9px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px 7px;font-weight:600}
.pw{font-size:11px;font-weight:800;color:var(--acc);background:var(--acc-bg);padding:4px 10px;border-radius:var(--radius-xs);flex-shrink:0}
.green .ps{background:var(--g)}.green .pb{color:var(--g);background:var(--gbg);border-color:var(--gbd)}
.yellow .ps{background:var(--y)}.yellow .pb{color:var(--y);background:var(--ybg);border-color:var(--ybd)}
.red .ps{background:var(--r)}.red .pb{color:var(--r);background:var(--rbg);border-color:var(--rbd)}
.critical .ps{background:#7f1d1d;animation:pulse-crit 1.5s infinite}.critical .pb{color:#fca5a5;background:#450a0a;border-color:#7f1d1d}
.critical{border-color:#7f1d1d;background:linear-gradient(135deg,#fff 0%,#fef2f2 100%)}
@keyframes pulse-crit{0%,100%{opacity:.7}50%{opacity:1}}

.fg{margin-bottom:16px}
.fl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:block}
.fi{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-family:inherit;font-size:14px;color:var(--txt);outline:none;direction:rtl}
.fi:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-bg)}
.fi::placeholder{color:var(--muted2)}
.cg2{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.co{border:2px solid var(--border);border-radius:12px;padding:14px 4px;text-align:center;cursor:pointer;background:var(--card)}
.co:active{transform:scale(.93)}
.co .cn{font-size:20px;font-weight:900;color:var(--muted)}
.co .ct{font-size:8px;color:var(--muted);margin-top:2px;font-weight:700}
.co.s1{border-color:var(--g);background:var(--gbg)}.co.s1 .cn{color:var(--g)}.co.s1 .ct{color:var(--g)}
.co.s2{border-color:var(--y);background:var(--ybg)}.co.s2 .cn{color:var(--y)}.co.s2 .ct{color:var(--y)}
.co.s3{border-color:var(--r);background:var(--rbg)}.co.s3 .cn{color:var(--r)}.co.s3 .ct{color:var(--r)}
.co.s4{border-color:#7f1d1d;background:#450a0a}.co.s4 .cn{color:#fca5a5}.co.s4 .ct{color:#fca5a5}

.btn{width:100%;background:var(--acc);color:#fff;border:none;border-radius:var(--radius-sm);padding:14px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 2px 8px rgba(14,165,233,.2)}
.btn:active{opacity:.85;transform:scale(.98)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn2{background:var(--card);color:var(--txt);border:1.5px solid var(--border);box-shadow:var(--shadow);border-radius:var(--radius-sm);padding:14px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;width:100%}
.btnd{background:var(--rbg);color:var(--r);border:1.5px solid var(--rbd);border-radius:var(--radius-sm);padding:13px 16px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}

.pin-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.pin-icon{width:64px;height:64px;border-radius:18px;background:var(--pri);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.pin-dots{display:flex;gap:16px;margin-bottom:32px}
.pdot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);transition:all .2s cubic-bezier(.4,1.5,.6,1)}
.pdot.f{background:var(--acc);border-color:var(--acc);transform:scale(1.15)}
.pkeys{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;width:100%}
.pkey{width:64px;height:64px;border-radius:50%;border:none;background:var(--card);font-size:22px;font-weight:600;color:var(--txt);cursor:pointer;margin:0 auto;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);font-family:inherit}
.pkey:active{background:var(--bg2);transform:scale(.88)}
.pkey.del{background:transparent;box-shadow:none;color:var(--muted);font-size:13px}
.pin-err{color:var(--r);font-weight:600;font-size:13px;margin-bottom:12px;animation:shake .4s}

.uc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px}
.uc:active{transform:scale(.99)}
.uh{background:var(--pri);padding:12px 16px;color:#fff;font-weight:800;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.uh span:last-child{opacity:.4;font-size:11px;font-weight:600}
.ub{display:grid;grid-template-columns:1fr 1fr}
.ubtn{padding:18px 12px;text-align:center;cursor:pointer;border:none;background:transparent}
.ubtn:active{background:var(--bg)}
.ubtn.male{border-left:1px solid var(--border)}
.ubtn-ico{color:var(--muted);opacity:.4;margin-bottom:6px}
.ubtn-name{font-size:12px;font-weight:700;color:var(--txt)}
.ubtn-cnt{display:inline-block;margin-top:6px;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700}
.male .ubtn-cnt{background:var(--acc-bg);color:var(--acc);border:1px solid var(--acc-bd)}
.female .ubtn-cnt{background:#fdf2f8;color:#db2777;border:1px solid #fce7f3}

.sp{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}.sp::-webkit-scrollbar{display:none}
.ir{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px;align-items:center}
.ir:last-child{border:none}

.loader{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 24px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;z-index:1000;white-space:nowrap;transition:transform .3s cubic-bezier(.22,1,.36,1);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--pri);color:#fff;box-shadow:var(--shadow-lg)}
.toast.err{background:var(--r);color:#fff}
.offbar{background:var(--rbg);border-bottom:1px solid var(--rbd);color:var(--r);text-align:center;font-size:11px;font-weight:700;padding:6px;flex-shrink:0;display:none}
.offbar.show{display:block}
.tabs{display:flex;border-bottom:2px solid var(--border);flex-shrink:0;background:var(--card)}
.tab{flex:1;padding:12px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.act{color:var(--acc);border-bottom-color:var(--acc)}
.hero{background:var(--pri);border-radius:var(--radius);padding:20px;margin-bottom:12px;color:#fff;box-shadow:var(--shadow-lg)}
.ibanner{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);padding:16px 20px calc(16px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:14px;z-index:200;transform:translateY(100%);transition:transform .4s cubic-bezier(.22,1,.36,1);border-top:1px solid rgba(56,189,248,.15);box-shadow:0 -8px 32px rgba(0,0,0,.4)}
.ibanner.show{transform:translateY(0)}
.ibanner strong{font-size:14px;font-weight:800;color:#fff;display:block;letter-spacing:-.2px}
.ibanner span{font-size:11px;color:#64748b;margin-top:2px}
.install-guide{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:flex-end;justify-content:center;z-index:400;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.install-guide.show{display:flex}
.install-guide__card{width:100%;max-width:430px;background:linear-gradient(180deg,#1e293b 0%,#0f172a 100%);border-radius:24px 24px 0 0;padding:32px 24px calc(24px + env(safe-area-inset-bottom));box-shadow:0 -16px 48px rgba(0,0,0,.5);color:#fff;position:relative;font-family:'Inter',system-ui,sans-serif;animation:ig-slide .35s cubic-bezier(.22,1,.36,1)}
@keyframes ig-slide{from{transform:translateY(100%)}to{transform:translateY(0)}}
.install-guide__close{position:absolute;top:16px;right:16px;width:36px;height:36px;border:none;border-radius:12px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.install-guide__close:active{background:rgba(255,255,255,.15)}
.install-guide__icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#0ea5e9,#38bdf8);display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 24px rgba(14,165,233,.3)}
.install-guide__title{font-size:22px;font-weight:900;margin-bottom:6px;letter-spacing:-.5px}
.install-guide__desc{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:24px;line-height:1.5}
.install-guide__steps{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.install-guide__step{display:flex;gap:14px;align-items:flex-start;padding:14px 16px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);transition:all .2s}
.install-guide__step.active{background:rgba(14,165,233,.08);border-color:rgba(14,165,233,.2)}
.install-guide__step-num{width:28px;height:28px;border-radius:10px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:rgba(255,255,255,.4);flex-shrink:0}
.install-guide__step.active .install-guide__step-num{background:var(--acc);color:#fff;box-shadow:0 4px 12px rgba(14,165,233,.4)}
.install-guide__step-text{flex:1;min-width:0}
.install-guide__step-title{font-size:13px;font-weight:700;margin-bottom:2px;color:rgba(255,255,255,.85)}
.install-guide__step.active .install-guide__step-title{color:#fff}
.install-guide__step-desc{font-size:11.5px;color:rgba(255,255,255,.4);line-height:1.4}
.install-guide__step.active .install-guide__step-desc{color:rgba(255,255,255,.65)}
.install-guide__cta{width:100%;border:none;border-radius:14px;padding:14px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:#fff;box-shadow:0 8px 24px rgba(14,165,233,.25);transition:transform .15s,box-shadow .15s;letter-spacing:-.2px}
.install-guide__cta:active{transform:scale(.97);box-shadow:0 4px 12px rgba(14,165,233,.2)}
.install-guide__hint{font-size:11px;color:rgba(255,255,255,.35);text-align:center;margin-top:12px;line-height:1.4}
.ib-btn{background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:#fff;border:none;border-radius:12px;padding:10px 20px;font-family:inherit;font-size:12px;font-weight:800;cursor:pointer;box-shadow:0 4px 12px rgba(14,165,233,.3);transition:transform .15s}
.ib-btn:active{transform:scale(.95)}
.ib-x{background:none;border:none;color:rgba(255,255,255,.25);font-size:18px;cursor:pointer;padding:4px}
.t-overlay{position:fixed;inset:0;background:rgba(15,23,42,.85);backdrop-filter:blur(16px);z-index:500;display:flex;align-items:center;justify-content:center}
.c-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(8px);z-index:400;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border-radius:var(--radius);padding:28px 22px;text-align:center;max-width:300px;width:90%;box-shadow:var(--shadow-lg)}
.priv-blur{position:fixed;inset:0;background:rgba(15,23,42,.97);backdrop-filter:blur(30px);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column}
.priv-blur.show{display:flex}
.ocr-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;background:var(--card)}
.ocr-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.ocr-chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.ocr-chk.on{background:var(--acc)}
.pwa-wt{display:none;position:fixed;left:50%;transform:translateX(-50%);width:280px;z-index:10000;background:rgba(255,255,255,.93);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-radius:24px;padding:14px;box-shadow:0 20px 50px rgba(0,0,0,.25);text-align:center;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;border:.5px solid rgba(0,0,0,.06);animation:wt-in .35s cubic-bezier(.22,1,.36,1)}
@keyframes wt-in{from{opacity:0;transform:translateX(-50%) scale(.92)}to{opacity:1;transform:translateX(-50%) scale(1)}}
.pwa-wt.safari-bottom{bottom:90px}
.pwa-wt.safari-top{top:90px}
.pwa-wt__close{position:absolute;top:-10px;right:-10px;background:#333;color:#fff;border:none;width:30px;height:30px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.3);z-index:1}
.pwa-wt__close:active{background:#555}
.pwa-wt__anim{width:100%;height:200px;border-radius:18px;background:linear-gradient(180deg,#f2f2f7,#e5e5ea);border:1px solid rgba(0,0,0,.08);overflow:hidden;position:relative;margin-bottom:12px}
.pwa-wt__safari{position:absolute;bottom:0;left:0;right:0;height:44px;background:rgba(255,255,255,.95);border-top:1px solid rgba(0,0,0,.1);display:flex;align-items:center;justify-content:space-around;padding:0 16px}
.pwa-wt__safari.top{bottom:auto;top:0;border-top:none;border-bottom:1px solid rgba(0,0,0,.1)}
.pwa-wt__share-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;position:relative}
.pwa-wt__share-btn svg{color:#007AFF}
.pwa-wt__finger{position:absolute;width:24px;height:24px;opacity:0;animation:wt-tap 4s ease-in-out infinite}
@keyframes wt-tap{0%,100%{opacity:0;transform:translate(30px,30px)}15%{opacity:.8;transform:translate(0,0)}25%{opacity:1;transform:translate(0,2px) scale(.95)}35%{opacity:1;transform:translate(0,0)}50%{opacity:0;transform:translate(0,-10px)}51%,99%{opacity:0}}
.pwa-wt__menu{position:absolute;left:50%;transform:translateX(-50%);width:220px;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.15);opacity:0;animation:wt-menu 4s ease-in-out infinite;overflow:hidden}
.pwa-wt__menu.from-bottom{bottom:52px}
.pwa-wt__menu.from-top{top:52px}
@keyframes wt-menu{0%,30%{opacity:0;transform:translateX(-50%) translateY(8px)}40%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1;transform:translateX(-50%) translateY(0)}95%,100%{opacity:0;transform:translateX(-50%) translateY(8px)}}
.pwa-wt__mitem{padding:10px 14px;font-size:12px;color:#1c1c1e;border-bottom:.5px solid rgba(0,0,0,.06);display:flex;align-items:center;gap:8px;white-space:nowrap}
.pwa-wt__mitem.hl{background:rgba(0,122,255,.08);color:#007AFF;font-weight:600}
.pwa-wt__mitem svg{width:16px;height:16px;flex-shrink:0}
.pwa-wt__finger2{position:absolute;width:20px;height:20px;opacity:0;animation:wt-tap2 4s ease-in-out infinite}
@keyframes wt-tap2{0%,55%{opacity:0}65%{opacity:.8;transform:translate(0,0)}75%{opacity:1;transform:translate(0,2px) scale(.95)}82%{opacity:1;transform:translate(0,0)}90%,100%{opacity:0}}
.pwa-wt__caption{font-size:13px;font-weight:600;color:#1c1c1e;margin-bottom:4px}
.pwa-wt__subcap{font-size:11px;color:#8e8e93;line-height:1.4}
.pwa-wt__arrow{position:absolute;left:50%;transform:translateX(-50%);width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent}
.pwa-wt__arrow.up{top:-13px;border-bottom:13px solid rgba(255,255,255,.93)}
.pwa-wt__arrow.down{bottom:-13px;border-top:13px solid rgba(255,255,255,.93)}
</style>
</head>
<body>
<script src="boot.js"></script>
<div id="app"><div class="screen" style="align-items:center;justify-content:center"><div class="loader"></div></div></div>
<div class="toast" id="toast"></div>
<div id="cr"></div>
<div id="tr"></div>
<div class="priv-blur" id="pb">
  <div style="width:56px;height:56px;border-radius:16px;background:var(--acc);display:flex;align-items:center;justify-content:center;margin-bottom:14px">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div>
  <div style="color:rgba(255,255,255,.5);font-size:13px;font-weight:600">MedEvac is locked</div>
</div>
<div class="ibanner" id="ibanner">
  <div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#0ea5e9,#38bdf8);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
  <div style="flex:1"><strong>Install MedEvac</strong><span>Works offline in emergencies</span></div>
  <button class="ib-btn" id="ib-btn">Install</button>
  <button class="ib-x" id="ib-dismiss">&#x2715;</button>
</div>
<div class="install-guide" id="install-guide" aria-live="polite" role="dialog" aria-label="Install MedEvac">
  <div class="install-guide__card">
    <button class="install-guide__close" id="install-guide-close" aria-label="Close">×</button>
    <div class="install-guide__icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
    <div class="install-guide__title">Install MedEvac</div>
    <div class="install-guide__desc">Add to your home screen for instant access. Works offline during emergencies.</div>
    <div class="install-guide__steps" id="install-guide-steps"></div>
    <button class="install-guide__cta" id="install-guide-now">Install Now</button>
    <div class="install-guide__hint" id="install-guide-hint"></div>
  </div>
</div>
<div class="pwa-wt" id="pwa-wt">
  <div class="pwa-wt__arrow up" id="wt-arrow-up"></div>
  <button class="pwa-wt__close" id="wt-close">&times;</button>
  <div class="pwa-wt__anim" id="wt-anim"></div>
  <div class="pwa-wt__caption">Install MedEvac</div>
  <div class="pwa-wt__subcap">Tap Share, then "Add to Home Screen"</div>
  <div class="pwa-wt__arrow down" id="wt-arrow-down"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
