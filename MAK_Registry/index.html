:root{

  --bg:#f0f2f5;--card:#ffffff;--text:#1a1d26;--muted:#7c8495;--border:#e4e7ec;
  --g:#10b981;--gbg:#ecfdf5;--gb:#a7f3d0;
  --y:#f59e0b;--ybg:#fffbeb;--yb:#fde68a;
  --r:#ef4444;--rbg:#fef2f2;--rb:#fecaca;
  --rad:16px;
  --shadow:0 1px 2px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.06);
  --shadow2:0 2px 4px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;direction:rtl;overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:480px;margin:0 auto;
  background:var(--bg);position:relative;box-shadow:0 0 60px rgba(0,0,0,.08)}
.screen{display:flex;flex-direction:column;height:100%;animation:fi .3s cubic-bezier(.25,.46,.45,.94) both}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 currentColor}50%{box-shadow:0 0 0 4px transparent}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* HDR */
.hdr{background:linear-gradient(135deg,var(--pri) 0%,var(--pri2) 100%);

.htitle{font-size:18px;font-weight:800;letter-spacing:-.3px}
.hsub{font-size:11px;opacity:.45;margin-top:2px;font-weight:500;letter-spacing:.2px}
.hright{display:flex;gap:8px;align-items:center}
.ibtn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;
  width:38px;height:38px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;backdrop-filter:blur(10px)}
.ibtn:active{background:rgba(255,255,255,.2);transform:scale(.92)}
.opill{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:10px;font-weight:600;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(10px)}
.opill.on{color:#6ee7b7}.opill.off{color:#fca5a5}
.odot{width:6px;height:6px;border-radius:50%;background:currentColor}
.odot.p{animation:pdot 2s infinite}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);background:var(--card);
  border-bottom:1px solid var(--border);flex-shrink:0}
.stat{padding:14px 4px;text-align:center;border-left:1px solid var(--border);cursor:pointer;
  transition:all .2s;position:relative}
.stat:last-child{border-left:none}
.stat.act{background:var(--bg)}
.stat.act::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;border-radius:2px}
.st.act::after{background:var(--pri)}.sg.act::after{background:var(--g)}.sy.act::after{background:var(--y)}.sr.act::after{background:var(--r)}
.sn{font-size:22px;font-weight:900;line-height:1}
.sl{font-size:10px;color:var(--muted);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.st .sn{color:var(--pri)}.sg .sn{color:var(--g)}.sy .sn{color:var(--y)}.sr .sn{color:var(--r)}

/* TOOLBAR */
.toolbar{padding:12px 16px;display:flex;gap:10px;flex-shrink:0;background:var(--card);border-bottom:1px solid var(--border)}
.si{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:11px 16px;

.si:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(79,110,247,.1)}
.si::placeholder{color:var(--muted)}

.pstripe{position:absolute;right:0;top:0;bottom:0;width:4px}
.pbadge{width:48px;height:48px;border-radius:14px;display:flex;flex-direction:column;

.pn{font-size:14px;font-weight:700;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.pm{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:10px;color:var(--muted);background:var(--bg);border:1px solid var(--border);

.pw{font-size:13px;font-weight:800;color:var(--accent);flex-shrink:0;

.fl{font-size:11px;color:var(--muted);display:block;margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:12px;

.slist::-webkit-scrollbar{display:none}
.sp{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

.ir:last-child{border-bottom:none;margin-bottom:8px}

.empty{text-align:center;padding:80px 20px;color:var(--muted);font-size:14px;font-weight:500}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(80px);

.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--pri);color:#fff}.toast.err{background:var(--r);color:#fff}.toast.warn{background:var(--y);color:#000}

/* OFFLINE */

  text-align:center;font-size:12px;font-weight:700;padding:8px;flex-shrink:0;display:none}
.offbar.show{display:block}

.ibanner-text strong{display:block;font-size:14px;font-weight:800;color:#fff}
.ibanner-text span{font-size:12px;color:#94a3b8}
.ibanner-btn{background:#fff;color:var(--pri);border:none;border-radius:10px;
  padding:11px 20px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,.1)}
.ibanner-x{background:none;border:none;color:rgba(255,255,255,.3);font-size:20px;cursor:pointer;padding:4px;flex-shrink:0}
</style>

async function seedData() {
  const s1 = await get(ref(db,"patients/E_M"));
  if (!s1.exists()) for (const p of SEED_E_M) await push(ref(db,"patients/E_M"),{...p,ts:Date.now()});
  const s2 = await get(ref(db,"patients/E_F"));
  if (!s2.exists()) for (const p of SEED_E_F) await push(ref(db,"patients/E_F"),{...p,ts:Date.now()});
  const sp = await get(ref(db,"pins"));
  if (!sp.exists()) await set(ref(db,"pins"),DEFAULT_PINS);
}

function listenUnit(uid) {
  if (S.unsub) { off(ref(db,`patients/${S.unit}`)); }
  S.unit = uid;
  onValue(ref(db,`patients/${uid}`), snap => {
    const d = snap.val()||{};
    const wasEmpty = S.patients.length === 0;
    S.patients = Object.entries(d).map(([k,v])=>({...v,_k:k}));
    if (S.screen==="ward") render();
    if (wasEmpty && S.patients.length > 0) emergencyBackupPNG();
  });
}

function listenAll() {
  onValue(ref(db,"patients"), snap => {
    S.allData = snap.val()||{};
    if (S.screen==="admin") render();
  });
  onValue(ref(db,"pins"), snap => {
    if (snap.exists()) S.pins = {...DEFAULT_PINS,...snap.val()};
  });
}

async function fbSave(uid, key, data) { await set(ref(db,`patients/${uid}/${key}`),{...data,ts:Date.now()}); }
async function fbAdd(uid, data)        { await push(ref(db,`patients/${uid}`),{...data,ts:Date.now()}); }
async function fbDel(uid, key)         { await remove(ref(db,`patients/${uid}/${key}`)); }
async function fbSetPin(uid, pin)      { await set(ref(db,`pins/${uid}`),pin); }

function toast(msg,type="ok") {
  const t = el("toast");
  t.className=`toast ${type}`;t.textContent=msg;
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add("show")));
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove("show"),2800);
}

function filtered() {
  let list=[...S.patients];
  if(S.filter==="1")list=list.filter(p=>p.code==1);
  else if(S.filter==="2")list=list.filter(p=>p.code==2);
  else if(S.filter==="r")list=list.filter(p=>p.code>=3);
  if(S.search){const q=S.search.toLowerCase();list=list.filter(p=>(p.name||"").toLowerCase().includes(q)||(p.civil||"").includes(q)||(p.ward||"").toLowerCase().includes(q));}
  return list.sort((a,b)=>b.code-a.code);
}

// ── EMERGENCY BACKUP PNG ─────────────────────────────────────────────
let _lastBackupUrl = null;
function emergencyBackupPNG() {
  if (!S.unit) return;
  const patients = [...S.patients].sort((a,b) => b.code - a.code);
  if (!patients.length) return;

  const cols = ["#","الاسم","المدني","الجنسية","الجناح","الكود","ملاحظات"];
  const rows = patients.map((p,i) => [
    String(i+1), p.name||"", p.civil||"", p.nat||"", p.ward||"", String(p.code||""), p.notes||""
  ]);

  const cv = document.createElement("canvas");
  const ctx = cv.getContext("2d");
  const fs = 14, pad = 10, rowH = fs + pad * 2, hdrH = rowH + 4;
  const colW = [40, 180, 100, 80, 80, 50, 160];
  const totalW = colW.reduce((a,b) => a+b, 0) + 20;
  const titleH = 50;
  const totalH = titleH + hdrH + rows.length * rowH + 20;
  cv.width = totalW; cv.height = totalH;

  // background
  ctx.fillStyle = "#0a0f1e"; ctx.fillRect(0, 0, totalW, totalH);

  // title
  ctx.fillStyle = "#60a5fa"; ctx.font = `bold 18px Inter, sans-serif`; ctx.textAlign = "right"; ctx.textBaseline = "middle";
  const isF = S.unit.endsWith("_F");
  const unitLabel = `وحدة ${S.unit[0]} — ${isF ? "إناث" : "ذكور"}`;
  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")} ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
  ctx.fillText(unitLabel, totalW - 10, 20);
  ctx.fillStyle = "#94a3b8"; ctx.font = `12px Inter, sans-serif`;
  ctx.fillText(dateStr, totalW - 10, 40);

  let y = titleH;
  const codeColors = {1:"#10b981",2:"#f59e0b",3:"#ef4444",4:"#ef4444"};

  // header
  ctx.fillStyle = "#1e293b"; ctx.fillRect(10, y, totalW - 20, hdrH);
  ctx.fillStyle = "#93c5fd"; ctx.font = `bold ${fs}px Inter, sans-serif`; ctx.textAlign = "right"; ctx.textBaseline = "middle";
  let x = totalW - 10;
  cols.forEach((c, i) => { ctx.fillText(c, x - 4, y + hdrH/2); x -= colW[i]; });
  y += hdrH;

  // rows
  rows.forEach((row, ri) => {
    ctx.fillStyle = ri % 2 === 0 ? "#0f172a" : "#131a2e";
    ctx.fillRect(10, y, totalW - 20, rowH);
    ctx.font = `${fs}px Inter, sans-serif`; ctx.textAlign = "right"; ctx.textBaseline = "middle";
    x = totalW - 10;
    row.forEach((cell, ci) => {
      if (ci === 5) ctx.fillStyle = codeColors[Number(cell)] || "#e2e8f0";
      else ctx.fillStyle = "#e2e8f0";
      const maxW = colW[ci] - 8;
      let txt = cell;
      while (ctx.measureText(txt).width > maxW && txt.length > 1) txt = txt.slice(0, -1) + "…";
      ctx.fillText(txt, x - 4, y + rowH/2);
      x -= colW[ci];
    });
    y += rowH;
  });

  cv.toBlob(blob => {
    if (!blob) return;
    // revoke previous backup URL
    if (_lastBackupUrl) URL.revokeObjectURL(_lastBackupUrl);
    const url = URL.createObjectURL(blob);
    _lastBackupUrl = url;
    const a = document.createElement("a");
    a.href = url;
    a.download = `MedEvac_Unit${S.unit[0]}_${S.unit.endsWith("_F")?"F":"M"}_${dateStr.replace(/[: ]/g,"_")}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }, "image/png");
}

function render() {

  if (s === "home") html = renderHome();
  else if (s === "pin") html = renderPin();
  else if (s === "ward") html = renderWard();
  else if (s === "detail") html = renderDetail();
  else if (s === "add") html = renderAdd();
  else if (s === "admin") html = renderAdmin();
  app.innerHTML = html;
  bindEvents();
}

          <span>وحدة ${u}</span><span style="opacity:.5;font-size:12px">${all.length} مريض</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);padding:10px;gap:8px;text-align:center">
          <div><div style="font-size:18px;font-weight:900;color:var(--accent)">${all.length}</div><div style="font-size:10px;color:var(--muted)">الكل</div></div>
          <div><div style="font-size:18px;font-weight:900;color:var(--g)">${g}</div><div style="font-size:10px;color:var(--muted)">أخضر</div></div>
          <div><div style="font-size:18px;font-weight:900;color:var(--y)">${y}</div><div style="font-size:10px;color:var(--muted)">أصفر</div></div>
          <div><div style="font-size:18px;font-weight:900;color:var(--r)">${r}</div><div style="font-size:10px;color:var(--muted)">أحمر</div></div>
        </div>
      </div>`;
    }).join("");
  }

  if (S.adminTab==="ocr") {
    content = `
      <div class="ocr-zone" id="ocr-zone">
        <input type="file" id="ocr-file" accept="image/*" capture="environment" style="display:none">
        <div style="font-size:40px;margin-bottom:12px">${icoCam}</div>
        <div style="font-weight:700;color:var(--text);margin-bottom:6px">التقط صورة أو ارفع ملف</div>
        <div style="font-size:13px;color:var(--muted)">صورة قائمة المرضى → استيراد فوري</div>
      </div>
      ${S.ocrImg?`<img src="${S.ocrImg}" style="width:100%;border-radius:12px;margin:12px 0;max-height:200px;object-fit:cover">`:""}
      ${S.ocrLoading?`<div style="text-align:center;padding:20px"><div class="loader"></div><p style="margin-top:12px;color:var(--muted)">جاري التحليل بـ Gemini AI...</p></div>`:""}
      ${S.ocrResults.length?`
        <div style="margin-top:12px">
          <div style="font-weight:700;font-size:14px;margin-bottom:8px;color:var(--text)">
            تم اكتشاف ${S.ocrResults.length} مريض — اختر الوحدة:
          </div>
          <div class="fg">
            <select class="fi" id="ocr-unit">
              ${["A","B","C","D","E"].flatMap(u=>[
                `<option value="${u}_M">وحدة ${u} — ذكور</option>`,
                `<option value="${u}_F">وحدة ${u} — إناث</option>`
              ]).join("")}
            </select>
          </div>
          ${S.ocrResults.map((p,i)=>`
            <div class="orow">
              <div class="ochk ${S.ocrSel.includes(i)?"on":""}" data-ocr="${i}">${S.ocrSel.includes(i)?icoChk:""}</div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:14px">${p.name||"—"}</div>
                <div style="font-size:12px;color:var(--muted)">${p.civil||""} · ${p.ward||""}</div>
              </div>
              <div style="font-size:18px;font-weight:900;color:${ccfg(p.code).color}">${p.code}</div>
            </div>`).join("")}
          <div style="display:flex;gap:8px;margin-top:12px">
            <button class="btn btn-g" id="ocr-selall">تحديد الكل</button>
            <button class="btn" id="ocr-import" ${S.ocrSel.length===0?"disabled":""}>
              ${icoPlus} استيراد ${S.ocrSel.length} مريض
            </button>
          </div>
        </div>`:""}`;
  }

  if (S.adminTab==="pins") {
    const unitLabels = {
      A_M:"وحدة A ذكور",A_F:"وحدة A إناث",
      B_M:"وحدة B ذكور",B_F:"وحدة B إناث",
      C_M:"وحدة C ذكور",C_F:"وحدة C إناث",
      D_M:"وحدة D ذكور",D_F:"وحدة D إناث",
      E_M:"وحدة E ذكور",E_F:"وحدة E إناث",
      ADMIN:"المدير"
    };
    content = `
      <div style="background:var(--rbg);border:1px solid var(--rb);border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--r)">
        ⚠️ احتفظ بهذه الرموز بسرية تامة
      </div>
      ${Object.entries(unitLabels).map(([uid,label])=>`
        <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)">
          <div style="flex:1;font-weight:700;font-size:14px">${label}</div>
          <input class="fi" id="pin-${uid}" value="${S.pins[uid]||""}" maxlength="6" style="width:90px;text-align:center;font-size:18px;font-weight:900;letter-spacing:4px">
          <button class="btn" style="width:auto;padding:10px 14px" data-savepin="${uid}">${icoSave}</button>
        </div>`).join("")}`;
  }

  return `<div class="screen">
    <div class="hdr">
      <button class="ibtn" id="btn-back">${icoBack}</button>
      <div style="flex:1;text-align:center"><div class="htitle">لوحة الإدارة</div></div>
      <div style="width:38px"></div>
    </div>
    <div class="tabs">
      ${tabs.map(t=>`<div class="tab ${S.adminTab===t.id?"act":""}" data-tab="${t.id}">${t.label}</div>`).join("")}
    </div>
    <div class="sp" style="padding:12px 12px 80px">${content}</div>
  </div>`;
}

// ── BIND EVENTS ──────────────────────────────────────────────────────
function bindEvents() {
  // Unit buttons
  document.querySelectorAll("[data-unit]").forEach(btn => {
    btn.addEventListener("click", () => {
      const uid = btn.dataset.unit;
      S.pinTarget = uid;
      S.pinVal = "";
      S.pinError = false;
      S.screen = "pin";
      render();
    });
  });

  // Admin button
  const ba = el("btn-admin");
  if (ba) ba.addEventListener("click", () => {
    S.pinTarget = "ADMIN"; S.pinVal = ""; S.pinError=false; S.screen="pin"; render();
  });

  // Back button
  const bb = el("btn-back");
  if (bb) bb.addEventListener("click", () => {
    if (S.screen==="ward"||S.screen==="admin") { S.screen="home"; render(); }
    else if (S.screen==="detail"||S.screen==="add") { S.screen="ward"; render(); }
    else if (S.screen==="pin") { S.screen="home"; render(); }
  });

  // PIN pad
  document.querySelectorAll("[data-pin]").forEach(k => {
    k.addEventListener("click", () => {
      const v = k.dataset.pin;
      if (v==="⌫") { S.pinVal=S.pinVal.slice(0,-1); }
      else if (S.pinVal.length<6) { S.pinVal+=v; }
      S.pinError=false;
      if (S.pinVal.length===4||(S.pins[S.pinTarget]?.length>4&&S.pinVal.length===6)) checkPin();
      else render();
    });
  });

  // Filters
  document.querySelectorAll("[data-filt]").forEach(f => {
    f.addEventListener("click", () => { S.filter=f.dataset.filt; render(); });
  });

  // Search
  const si = el("search-inp");
  if (si) si.addEventListener("input", e => { S.search=e.target.value; render(); });

  // Patient card tap
  document.querySelectorAll(".pc").forEach(c => {
    c.addEventListener("click", () => {
      const p = S.patients.find(x=>x._k===c.dataset.key);
      if (p) { S.editP=p; S.editCode=p.code; S.screen="detail"; render(); }
    });
  });

  // Code picker (edit)
  document.querySelectorAll("[data-cpick='e']").forEach(c => {
    c.addEventListener("click", () => { S.editCode=parseInt(c.dataset.code); render(); });
  });

  // Code picker (add)
  document.querySelectorAll("[data-cpick='a']").forEach(c => {
    c.addEventListener("click", () => { S.addCode=parseInt(c.dataset.code); render(); });
  });

  // Save edit
  const bs = el("btn-save");
  if (bs) bs.addEventListener("click", async () => {
    bs.disabled=true;
    const p = S.editP;
    const updated = {...p, ward:el("e-ward").value.trim(), code:S.editCode, notes:el("e-notes").value.trim()};
    try { await fbSave(S.unit, p._k, updated); toast("✅ تم الحفظ"); S.screen="ward"; render(); }
    catch(e) { toast("خطأ في الحفظ","err"); bs.disabled=false; }
  });

  // Delete
  const bd = el("btn-delete");
  if (bd) bd.addEventListener("click", async () => {
    if (!confirm(`حذف "${S.editP.name}"؟`)) return;
    try { await fbDel(S.unit, S.editP._k); toast("🗑 تم الحذف"); S.screen="ward"; render(); }
    catch(e) { toast("خطأ في الحذف","err"); }
  });

  // Add
  const ba2 = el("btn-add");
  if (ba2) ba2.addEventListener("click", () => { S.addCode=null; S.screen="add"; render(); });

  // Save add
  const bsa = el("btn-save-add");
  if (bsa) bsa.addEventListener("click", async () => {
    const name=el("a-name").value.trim(), civil=el("a-civil").value.trim(),
          ward=el("a-ward").value.trim(), nat=el("a-nat").value.trim(),
          notes=el("a-notes").value.trim();
    if (!name||!civil||!ward||!S.addCode) { toast("يرجى ملء الحقول المطلوبة","err"); return; }
    bsa.disabled=true;
    try {
      await fbAdd(S.unit,{name,civil,nat,ward,code:S.addCode,notes});
      toast("✅ تمت الإضافة"); S.screen="ward"; render();
    } catch(e) { toast("خطأ","err"); bsa.disabled=false; }
  });

  // Admin tabs
  document.querySelectorAll("[data-tab]").forEach(t => {
    t.addEventListener("click", () => { S.adminTab=t.dataset.tab; render(); });
  });

  // OCR zone
  const oz = el("ocr-zone");
  if (oz) oz.addEventListener("click", () => el("ocr-file")?.click());
  const of_ = el("ocr-file");
  if (of_) of_.addEventListener("change", handleOCRFile);

  // OCR checkboxes
  document.querySelectorAll("[data-ocr]").forEach(c => {
    c.addEventListener("click", () => {
      const i=parseInt(c.dataset.ocr);
      if (S.ocrSel.includes(i)) S.ocrSel=S.ocrSel.filter(x=>x!==i);
      else S.ocrSel.push(i);
      render();
    });
  });

  // OCR select all
  const osa = el("ocr-selall");
  if (osa) osa.addEventListener("click", () => {
    S.ocrSel = S.ocrSel.length===S.ocrResults.length ? [] : S.ocrResults.map((_,i)=>i);
    render();
  });

  // OCR import
  const oi = el("ocr-import");
  if (oi) oi.addEventListener("click", handleOCRImport);

  // Save pins
  document.querySelectorAll("[data-savepin]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const uid=btn.dataset.savepin, val=el(`pin-${uid}`)?.value.trim();
      if (!val||val.length<4) { toast("الرمز يجب أن يكون 4 أحرف على الأقل","err"); return; }
      try { await fbSetPin(uid,val); S.pins[uid]=val; toast("✅ تم حفظ الرمز"); }
      catch(e) { toast("خطأ","err"); }
    });
  });
}

// ── PIN CHECK ────────────────────────────────────────────────────────
function checkPin() {
  const correct = S.pins[S.pinTarget] || DEFAULT_PINS[S.pinTarget];
  if (S.pinVal === correct) {
    if (S.pinTarget === "ADMIN") {
      S.screen = "admin";
      S.adminTab = "overview";
      listenAll();
    } else {
      S.screen = "ward";
      S.filter = "all";
      S.search = "";
      const uid = S.pinTarget;
      const u = UNITS_META[uid];
      listenUnit(uid);
    }
    render();
  } else {
    S.pinError = true;
    S.pinVal = "";
    render();
  }
}

const UNITS_META = {
  A_M:{label:"وحدة A",sub:"ذكور"}, A_F:{label:"وحدة A",sub:"إناث"},
  B_M:{label:"وحدة B",sub:"ذكور"}, B_F:{label:"وحدة B",sub:"إناث"},
  C_M:{label:"وحدة C",sub:"ذكور"}, C_F:{label:"وحدة C",sub:"إناث"},
  D_M:{label:"وحدة D",sub:"ذكور"}, D_F:{label:"وحدة D",sub:"إناث"},
  E_M:{label:"وحدة E",sub:"ذكور"}, E_F:{label:"وحدة E",sub:"إناث"},
};

// ── OCR ──────────────────────────────────────────────────────────────
function handleOCRFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    const b64 = ev.target.result.split(",")[1];
    S.ocrImg = ev.target.result;
    S.ocrB64 = b64;
    S.ocrResults = [];
    S.ocrSel = [];
    S.ocrLoading = true;
    render();
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI}`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          contents:[{parts:[
            {inline_data:{mime_type:file.type,data:b64}},
            {text:`Extract ALL patient records from this image. Return ONLY a JSON array, no markdown, no explanation. Each object must have exactly these fields:
{"name":"full Arabic name","civil":"civil ID number as string","nat":"nationality in Arabic","ward":"ward/bed like W21R8","code":number 1-4,"notes":""}
Code mapping: 1=green/أخضر, 2=yellow/أصفر, 3=red/أحمر, 4=critical/حرج
If a field is unclear write empty string. Return only the JSON array.`}
          ]}]
        })
      });
      const data = await res.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text||"[]";
      const clean = text.replace(/```json|```/g,"").trim();
      S.ocrResults = JSON.parse(clean);
      S.ocrSel = S.ocrResults.map((_,i)=>i);
    } catch(err) {
      toast("خطأ في التحليل — حاول مرة أخرى","err");
      S.ocrResults = [];
    }
    S.ocrLoading = false;
    render();
  };
  reader.readAsDataURL(file);
}

async function handleOCRImport() {
  const uid = el("ocr-unit")?.value;
  if (!uid||S.ocrSel.length===0) return;
  const btn = el("ocr-import");
  btn.disabled = true;
  btn.textContent = "جاري الاستيراد...";
  try {
    for (const i of S.ocrSel) {
      const p = S.ocrResults[i];
      await fbAdd(uid, {name:p.name||"",civil:p.civil||"",nat:p.nat||"",ward:p.ward||"",code:parseInt(p.code)||2,notes:p.notes||""});
    }
    toast(`✅ تم استيراد ${S.ocrSel.length} مريض`);
    S.ocrResults=[]; S.ocrSel=[]; S.ocrImg=null;
    render();
  } catch(e) {
    toast("خطأ في الاستيراد","err");
    btn.disabled=false;
  }
}

// ── INSTALL PROMPT ───────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault(); deferredPrompt=e;
  if (!localStorage.getItem("mak_installed")) {
    setTimeout(()=>el("ibanner")?.classList.add("show"),3000);
  }
});
el("ibanner-btn").addEventListener("click", () => {
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(()=>dismissInstall()); }
  else if (/iphone|ipad|ipod/i.test(navigator.userAgent)) {
    alert("iPhone:\n1. اضغط زر المشاركة ↑\n2. اختر «إضافة إلى الشاشة الرئيسية»\n3. اضغط «إضافة»");
    dismissInstall();
  }
});
window.dismissInstall = () => {
  el("ibanner")?.classList.remove("show");
  localStorage.setItem("mak_installed","1");
};

// ── CONNECTIVITY ─────────────────────────────────────────────────────
window.addEventListener("online",  () => { S.online=true;  render(); });
window.addEventListener("offline", () => { S.online=false; render(); });

// ── BOOT ─────────────────────────────────────────────────────────────
async function boot() {
  listenAll();
  await seedData();
  S.screen = "home";
  render();
}
boot();
</script>
<script>if("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");</script>
