<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f1f5f9;--bg2:#e2e8f0;--card:#fff;
  --pri:#0f172a;--pri2:#1e293b;--pri3:#334155;
  --acc:#0ea5e9;--acc2:#38bdf8;--acc-bg:rgba(14,165,233,.08);--acc-bd:rgba(14,165,233,.2);
  --txt:#0f172a;--muted:#64748b;--muted2:#94a3b8;
  --border:#e2e8f0;--border2:#cbd5e1;
  --g:#10b981;--gbg:#ecfdf5;--gbd:#a7f3d0;
  --y:#f59e0b;--ybg:#fffbeb;--ybd:#fcd34d;
  --r:#ef4444;--rbg:#fef2f2;--rbd:#fca5a5;
  --radius:16px;--radius-sm:12px;--radius-xs:8px;
  --shadow:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
  --shadow-md:0 4px 6px rgba(15,23,42,.05),0 10px 15px rgba(15,23,42,.06);
  --shadow-lg:0 10px 25px rgba(15,23,42,.08),0 20px 50px rgba(15,23,42,.06);
}
html,body{height:100%;background:var(--bg);color:var(--txt);
  font-family:'Inter',system-ui,sans-serif;direction:rtl;overflow:hidden;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:var(--bg);overflow:hidden}
.screen{display:flex;flex-direction:column;height:100%;opacity:0;animation:fadeIn .25s ease forwards}
@keyframes fadeIn{to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes pulse2{0%,100%{opacity:.6}50%{opacity:1}}

.hdr{background:var(--pri);padding:max(env(safe-area-inset-top),12px) 16px 14px;color:#fff;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-c{flex:1;min-width:0}
.hdr h1{font-size:16px;font-weight:800;letter-spacing:-.3px}
.hdr p{font-size:10px;opacity:.4;font-weight:500;margin-top:1px}
.hbtn{width:36px;height:36px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.hbtn:active{background:rgba(255,255,255,.15)}
.badge{font-size:9px;font-weight:700;padding:4px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;text-transform:uppercase;letter-spacing:.5px}
.badge-on{background:rgba(16,185,129,.15);color:#34d399}
.badge-off{background:rgba(239,68,68,.15);color:#f87171}
.ldot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse2 2s infinite}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.stat{padding:12px 4px;text-align:center;cursor:pointer;position:relative}
.stat:not(:last-child){border-left:1px solid var(--border)}
.stat.act{background:var(--bg)}
.stat.act::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;border-radius:1px}
.stat .n{font-size:20px;font-weight:900;line-height:1}
.stat .l{font-size:8px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-top:3px}
.ca .n{color:var(--txt)}.ca.act::after{background:var(--txt)}
.cg .n{color:var(--g)}.cg.act::after{background:var(--g)}
.cy .n{color:var(--y)}.cy.act::after{background:var(--y)}
.cr .n{color:var(--r)}.cr.act::after{background:var(--r)}

.sbar{padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.sinp{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-family:inherit;font-size:14px;color:var(--txt);outline:none;direction:rtl}
.sinp:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-bg)}
.sinp::placeholder{color:var(--muted2)}
.abtn{width:40px;height:40px;border-radius:var(--radius-sm);border:none;background:var(--acc);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.abtn:active{opacity:.8}

.plist{flex:1;overflow-y:auto;padding:8px 12px 100px;-webkit-overflow-scrolling:touch}
.plist::-webkit-scrollbar{display:none}

.pc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.pc:active{transform:scale(.98)}
.ps{position:absolute;right:0;top:0;bottom:0;width:3px}
.pb{width:44px;height:44px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;font-weight:900;border:1.5px solid}
.pb .bn{font-size:18px;line-height:1}
.pb .bt{font-size:7px;text-transform:uppercase;margin-top:1px}
.pi{flex:1;min-width:0}
.pn{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.pm{display:flex;gap:4px;flex-wrap:wrap}
.ch{font-size:9px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px 7px;font-weight:600}
.pw{font-size:11px;font-weight:800;color:var(--acc);background:var(--acc-bg);padding:4px 10px;border-radius:var(--radius-xs);flex-shrink:0}
.green .ps{background:var(--g)}.green .pb{color:var(--g);background:var(--gbg);border-color:var(--gbd)}
.yellow .ps{background:var(--y)}.yellow .pb{color:var(--y);background:var(--ybg);border-color:var(--ybd)}
.red .ps{background:var(--r)}.red .pb{color:var(--r);background:var(--rbg);border-color:var(--rbd)}

.fg{margin-bottom:16px}

.fi{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-family:inherit;font-size:14px;color:var(--txt);outline:none;direction:rtl}
.fi:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-bg)}
.fi::placeholder{color:var(--muted2)}
.cg2{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.co{border:2px solid var(--border);border-radius:12px;padding:14px 4px;text-align:center;cursor:pointer;background:var(--card)}

.co .cn{font-size:20px;font-weight:900;color:var(--muted)}
.co .ct{font-size:8px;color:var(--muted);margin-top:2px;font-weight:700}
.co.s1{border-color:var(--g);background:var(--gbg)}.co.s1 .cn{color:var(--g)}.co.s1 .ct{color:var(--g)}

.co.s3,.co.s4{border-color:var(--r);background:var(--rbg)}.co.s3 .cn,.co.s4 .cn{color:var(--r)}.co.s3 .ct,.co.s4 .ct{color:var(--r)}

.btn{width:100%;background:var(--acc);color:#fff;border:none;border-radius:var(--radius-sm);padding:14px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 2px 8px rgba(14,165,233,.2)}

.btn2{background:var(--card);color:var(--txt);border:1.5px solid var(--border);box-shadow:var(--shadow);border-radius:var(--radius-sm);padding:14px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;width:100%}
.btnd{background:var(--rbg);color:var(--r);border:1.5px solid var(--rbd);border-radius:var(--radius-sm);padding:13px 16px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}

.pin-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.pin-icon{width:64px;height:64px;border-radius:18px;background:var(--pri);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.pin-dots{display:flex;gap:16px;margin-bottom:32px}
.pdot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border2);transition:all .2s cubic-bezier(.4,1.5,.6,1)}
.pdot.f{background:var(--acc);border-color:var(--acc);transform:scale(1.15)}
.pkeys{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;width:100%}
.pkey{width:64px;height:64px;border-radius:50%;border:none;background:var(--card);font-size:22px;font-weight:600;color:var(--txt);cursor:pointer;margin:0 auto;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);font-family:inherit}
.pkey:active{background:var(--bg2);transform:scale(.88)}
.pkey.del{background:transparent;box-shadow:none;color:var(--muted);font-size:13px}
.pin-err{color:var(--r);font-weight:600;font-size:13px;margin-bottom:12px;animation:shake .4s}

.uc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px}
.uc:active{transform:scale(.99)}
.uh{background:var(--pri);padding:12px 16px;color:#fff;font-weight:800;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.uh span:last-child{opacity:.4;font-size:11px;font-weight:600}
.ub{display:grid;grid-template-columns:1fr 1fr}
.ubtn{padding:18px 12px;text-align:center;cursor:pointer;border:none;background:transparent}
.ubtn:active{background:var(--bg)}
.ubtn.male{border-left:1px solid var(--border)}
.ubtn-ico{color:var(--muted);opacity:.4;margin-bottom:6px}
.ubtn-name{font-size:12px;font-weight:700;color:var(--txt)}
.ubtn-cnt{display:inline-block;margin-top:6px;padding:3px 12px;border-radius:20px;font-size:10px;font-weight:700}
.male .ubtn-cnt{background:var(--acc-bg);color:var(--acc);border:1px solid var(--acc-bd)}
.female .ubtn-cnt{background:#fdf2f8;color:#db2777;border:1px solid #fce7f3}

.sp{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}.sp::-webkit-scrollbar{display:none}
.ir{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px;align-items:center}
.ir:last-child{border:none}

.loader{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 24px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;z-index:1000;white-space:nowrap;transition:transform .3s cubic-bezier(.22,1,.36,1);pointer-events:none}

.toast.ok{background:var(--pri);color:#fff;box-shadow:var(--shadow-lg)}
.toast.err{background:var(--r);color:#fff}
.offbar{background:var(--rbg);border-bottom:1px solid var(--rbd);color:var(--r);text-align:center;font-size:11px;font-weight:700;padding:6px;flex-shrink:0;display:none}
.offbar.show{display:block}
.tabs{display:flex;border-bottom:2px solid var(--border);flex-shrink:0;background:var(--card)}
.tab{flex:1;padding:12px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.act{color:var(--acc);border-bottom-color:var(--acc)}
.hero{background:var(--pri);border-radius:var(--radius);padding:20px;margin-bottom:12px;color:#fff;box-shadow:var(--shadow-lg)}
.ibanner{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:var(--pri);padding:14px 16px calc(14px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:12px;z-index:200;transform:translateY(100%);transition:transform .4s cubic-bezier(.22,1,.36,1)}
.ibanner.show{transform:translateY(0)}
.ibanner strong{font-size:13px;font-weight:800;color:#fff;display:block}
.ibanner span{font-size:11px;color:#94a3b8}
.install-guide{position:fixed;inset:0;background:rgba(15,23,42,.6);display:none;align-items:center;justify-content:center;z-index:400;backdrop-filter:blur(6px)}
.install-guide.show{display:flex}
.install-guide__card{width:min(420px,calc(100% - 40px));background:#0f172a;border-radius:20px;padding:24px;box-shadow:0 20px 40px rgba(15,23,42,.55);color:#fff;position:relative;font-family:'Inter',system-ui,sans-serif}
.install-guide__close{position:absolute;top:12px;right:12px;width:32px;height:32px;border:none;border-radius:10px;background:rgba(255,255,255,.1);color:#fff;font-size:18px;cursor:pointer}
.install-guide__title{font-size:20px;font-weight:800;margin-bottom:6px}
.install-guide__desc{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:16px}
.install-guide__step-title{font-size:16px;font-weight:700;margin-bottom:4px}
.install-guide__step-desc{font-size:13px;color:#cbd5f5;margin-bottom:16px;line-height:1.4}
.install-guide__progress{display:flex;gap:6px;margin-bottom:16px}
.install-guide__progress span{width:10px;height:10px;border-radius:999px;background:rgba(255,255,255,.3)}
.install-guide__progress span.active{background:#38bdf8;box-shadow:0 0 6px rgba(56,189,248,.8)}
.install-guide__actions{display:flex;gap:8px;margin-bottom:12px}
.install-guide__actions button{flex:1;border-radius:12px;border:none;padding:11px 0;font-weight:700;font-size:13px}
.install-guide__actions button:disabled{opacity:.4;cursor:not-allowed}
.install-guide__hint{font-size:12px;color:rgba(255,255,255,.6);text-align:center}
.ib-btn{background:#fff;color:var(--pri);border:none;border-radius:var(--radius-xs);padding:10px 18px;font-family:inherit;font-size:12px;font-weight:800;cursor:pointer}
.ib-x{background:none;border:none;color:rgba(255,255,255,.3);font-size:16px;cursor:pointer}
.t-overlay{position:fixed;inset:0;background:rgba(15,23,42,.85);backdrop-filter:blur(16px);z-index:500;display:flex;align-items:center;justify-content:center}
.c-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(8px);z-index:400;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border-radius:var(--radius);padding:28px 22px;text-align:center;max-width:300px;width:90%;box-shadow:var(--shadow-lg)}
.priv-blur{position:fixed;inset:0;background:rgba(15,23,42,.97);backdrop-filter:blur(30px);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column}
.priv-blur.show{display:flex}
.ocr-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;background:var(--card)}
.ocr-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.ocr-chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
.ocr-chk.on{background:var(--acc)}
</style>
</head>

<script>
function showFatal(html){
  const app=document.getElementById("app");
  if(app)app.innerHTML=html;
  else document.body.insertAdjacentHTML("afterbegin",html);
}
window.onerror=function(m,s,l,c,e){showFatal('<div style="padding:40px;color:red;font-size:13px;word-break:break-all"><b>Error:</b> '+m+'<br>Line: '+l+'</div>');};
window.onunhandledrejection=function(e){showFatal('<div style="padding:40px;color:red;font-size:13px;word-break:break-all"><b>Promise Error:</b> '+(e.reason?.message||e.reason)+'</div>');};
</script>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,onValue,set,push,remove,get,off}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const db=getDatabase(initializeApp({apiKey:"AIzaSyBuuSFWmjkDPiF-LNlZkjVcMDPK9sHyYEQ",authDomain:"unit-e-1d07b.firebaseapp.com",databaseURL:"https://unit-e-1d07b-default-rtdb.europe-west1.firebasedatabase.app",projectId:"unit-e-1d07b",storageBucket:"unit-e-1d07b.firebasestorage.app",messagingSenderId:"465930916288",appId:"1:465930916258:web:89210233e6ba1004d262fb"}));
const GK="AIzaSyA38cYzjTCuh3WPXgVWG6bnNAiygwq9fQ8";

// === Offline persistence ===
const LS={
  save(k,v){try{localStorage.setItem("mak_"+k,JSON.stringify(v));}catch(e){}},
  load(k){try{const v=localStorage.getItem("mak_"+k);return v?JSON.parse(v):null;}catch(e){return null;}},
  queueOp(op){const q=LS.load("queue")||[];q.push(op);LS.save("queue",q);},
  getQueue(){return LS.load("queue")||[];},
  clearQueue(){LS.save("queue",[]);}
};

function _offlineUpdate(uid,key,data){
  const cached=LS.load("patients_"+uid)||{};cached[key]=data;LS.save("patients_"+uid,cached);
  S.patients=Object.entries(cached).map(([k,v])=>({...v,_k:k}));
  const all=LS.load("allData")||{};if(!all[uid])all[uid]={};all[uid][key]=data;LS.save("allData",all);S.allData=all;
}
function _offlineRemove(uid,key){
  const cached=LS.load("patients_"+uid)||{};delete cached[key];LS.save("patients_"+uid,cached);
  S.patients=Object.entries(cached).map(([k,v])=>({...v,_k:k}));
  const all=LS.load("allData")||{};if(all[uid])delete all[uid][key];LS.save("allData",all);S.allData=all;
}
async function syncQueue(){
  const q=LS.getQueue();if(!q.length)return;
  const failed=[];
  for(const op of q){
    try{
      if(op.type==="set")await set(ref(db,op.path),op.data);
      else if(op.type==="remove")await remove(ref(db,op.path));
      else if(op.type==="push")await push(ref(db,op.path),op.data);
    }catch(e){failed.push(op);}
  }
  LS.save("queue",failed);

function renderInstallGuide(){
  const guide=document.getElementById("install-guide");

  const title=document.getElementById("install-guide-step-title");
  const desc=document.getElementById("install-guide-step-desc");
  const progress=document.getElementById("install-guide-progress");
  const step=installSteps[installGuideStep]||installSteps[0];
  if(title)title.textContent=step.title;
  if(desc)desc.textContent=step.desc;
  if(progress)progress.innerHTML=installSteps.map((s,i)=>`<span class="${i===installGuideStep?"active":""}"></span>`).join("");
  const prev=document.getElementById("install-guide-prev");
  const next=document.getElementById("install-guide-next");
  if(prev)prev.disabled=installGuideStep===0;
  if(next)next.disabled=installGuideStep===installSteps.length-1;
}

function showInstallGuide(force=false){
  const guide=document.getElementById("install-guide");
  if(!guide)return;
  if(!force&&!installSteps.length)return;
  if(!force&&localStorage.getItem(installGuideKey))return;
  installGuideStep=0;
  renderInstallGuide();
  guide.classList.add("show");
  localStorage.setItem(installGuideKey,"1");
}

function hideInstallGuide(){
  const guide=document.getElementById("install-guide");
  if(guide)guide.classList.remove("show");
}

function advanceInstallGuide(delta){
  installGuideStep=Math.max(0,Math.min(installSteps.length-1,installGuideStep+delta));
  renderInstallGuide();
}

  const p=S.editP,cv=S.showCivil[p._k]?p.civil:mask(p.civil);
  return'<div class="screen"><div class="hdr"><button class="hbtn" id="bb">'+I.back+'</button><div class="hdr-c" style="margin:0 8px"><h1 style="font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+p.name+'</h1><p>Details</p></div></div><div class="sp" style="padding:14px 14px 100px"><div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:0 14px;margin-bottom:16px;box-shadow:var(--shadow)"><div class="ir"><span style="color:var(--muted);font-weight:600">Civil ID</span><span style="font-weight:700;display:flex;align-items:center;gap:6px">'+cv+'<button style="background:none;border:none;cursor:pointer;color:var(--muted);padding:2px" id="tc">'+(S.showCivil[p._k]?I.eyeOff:I.eye)+'</button></span></div><div class="ir"><span style="color:var(--muted);font-weight:600">Nationality</span><span style="font-weight:700">'+(p.nat||"\u2014")+'</span></div></div><div class="fg"><label class="fl">Ward / Bed</label><input class="fi" id="ew" value="'+(p.ward||"")+'"></div><div class="fg"><label class="fl">Severity Code</label><div class="cg2">'+[1,2,3,4].map(c=>'<div class="co'+(S.editCode==c?" s"+c:"")+'" data-cpick="e" data-code="'+c+'"><div class="cn">'+c+'</div><div class="ct">'+cc(c).label+'</div></div>').join("")+'</div></div><div class="fg"><label class="fl">Notes</label><input class="fi" id="en" placeholder="Notes..." value="'+(p.notes||"")+'"></div><div style="display:flex;gap:8px"><button class="btn" id="bs">'+I.save+' Save</button><button class="btnd" id="bd">'+I.trash+'</button></div></div></div>';
}

function vAdd(){
  return'<div class="screen"><div class="hdr"><button class="hbtn" id="bb">'+I.back+'</button><div class="hdr-c" style="text-align:center"><h1>Add Patient</h1></div><div style="width:36px"></div></div><div class="sp" style="padding:14px 14px 100px"><div class="fg"><label class="fl">Full Name *</label><input class="fi" id="an" placeholder="Name" autocomplete="off"></div><div class="fg"><label class="fl">Civil ID *</label><input class="fi" id="ac" placeholder="Civil ID" inputmode="numeric" autocomplete="off"></div><div class="fg"><label class="fl">Nationality</label><input class="fi" id="at" placeholder="Nationality" autocomplete="off"></div><div class="fg"><label class="fl">Ward / Bed *</label><input class="fi" id="aw" placeholder="e.g. W21R8" autocomplete="off"></div><div class="fg"><label class="fl">Severity Code *</label><div class="cg2">'+[1,2,3,4].map(c=>'<div class="co'+(S.addCode==c?" s"+c:"")+'" data-cpick="a" data-code="'+c+'"><div class="cn">'+c+'</div><div class="ct">'+cc(c).label+'</div></div>').join("")+'</div></div><div class="fg"><label class="fl">Notes</label><input class="fi" id="ao" placeholder="Notes..." autocomplete="off"></div><button class="btn" id="bsa">'+I.plus+' Add Patient</button></div></div>';
}

function vAdmin(){
  const tabs=[{id:"overview",l:"Overview"},{id:"ocr",l:"OCR"},{id:"pins",l:"Security"}];let c="";
  if(S.adminTab==="overview")c=["A","B","C","D","E"].map(u=>{const m=Object.values(S.allData[u+"_M"]||{}),f=Object.values(S.allData[u+"_F"]||{}),all=[...m,...f],g=all.filter(p=>p.code==1).length,y=all.filter(p=>p.code==2).length,r=all.filter(p=>p.code>=3).length;return'<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)"><div style="background:var(--pri);padding:12px 16px;color:#fff;font-weight:800;font-size:13px;display:flex;justify-content:space-between"><span>Unit '+u+'</span><span style="opacity:.4;font-size:11px">'+all.length+'</span></div><div style="display:grid;grid-template-columns:repeat(4,1fr);padding:10px;text-align:center"><div><div style="font-size:18px;font-weight:900;color:var(--acc)">'+all.length+'</div><div style="font-size:8px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-top:2px">All</div></div><div><div style="font-size:18px;font-weight:900;color:var(--g)">'+g+'</div><div style="font-size:8px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-top:2px">Green</div></div><div><div style="font-size:18px;font-weight:900;color:var(--y)">'+y+'</div><div style="font-size:8px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-top:2px">Yellow</div></div><div><div style="font-size:18px;font-weight:900;color:var(--r)">'+r+'</div><div style="font-size:8px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-top:2px">Red</div></div></div></div>';}).join("");
  else if(S.adminTab==="ocr")c='<div class="ocr-drop" id="oz"><input type="file" id="of" accept="image/*" capture="environment" style="display:none"><div style="margin-bottom:12px;opacity:.5">'+I.cam+'</div><div style="font-weight:800;font-size:14px;margin-bottom:4px">Capture / Upload</div><div style="font-size:12px;color:var(--muted)">Image \u2192 import</div></div>'+(S.ocrImg?'<img src="'+S.ocrImg+'" style="width:100%;border-radius:12px;margin:10px 0;max-height:160px;object-fit:cover">':'')+(S.ocrLoading?'<div style="text-align:center;padding:20px"><div class="loader"></div><p style="margin-top:10px;color:var(--muted);font-size:12px">Analyzing...</p></div>':'')+(S.ocrResults.length?'<div style="margin-top:10px"><div class="fg"><select class="fi" id="ou">'+["A","B","C","D","E"].flatMap(u=>['<option value="'+u+'_M">Unit '+u+' M</option>','<option value="'+u+'_F">Unit '+u+' F</option>']).join("")+'</select></div>'+S.ocrResults.map((p,i)=>'<div class="ocr-row"><div class="ocr-chk'+(S.ocrSel.includes(i)?" on":"")+'" data-ocr="'+i+'">'+(S.ocrSel.includes(i)?I.chk:"")+'</div><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">'+(p.name||"-")+'</div><div style="font-size:11px;color:var(--muted)">'+(p.civil||"")+'</div></div></div>').join("")+'<div style="display:flex;gap:8px;margin-top:10px"><button class="btn2" id="osa">All</button><button class="btn" id="oi"'+(S.ocrSel.length?"":" disabled")+'>Import '+S.ocrSel.length+'</button></div></div>':'');
  else if(S.adminTab==="pins"){const labels={A_M:"A Male",A_F:"A Female",B_M:"B Male",B_F:"B Female",C_M:"C Male",C_F:"C Female",D_M:"D Male",D_F:"D Female",E_M:"E Male",E_F:"E Female",ADMIN:"Admin"};c='<div style="background:var(--rbg);border:1px solid var(--rbd);border-radius:var(--radius-xs);padding:10px;margin-bottom:12px;font-size:11px;color:var(--r);font-weight:600;display:flex;gap:6px">'+I.lock+' Keep PINs secret</div>'+Object.entries(labels).map(([uid,l])=>'<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xs);padding:10px;margin-bottom:6px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow)"><div style="flex:1;font-weight:700;font-size:13px">'+l+'</div><input class="fi" id="p-'+uid+'" value="'+(S.pins[uid]||"")+'" maxlength="6" type="password" style="width:70px;text-align:center;font-size:16px;font-weight:900;letter-spacing:3px;padding:8px" autocomplete="off"><button class="btn" style="width:auto;padding:8px 12px" data-sp="'+uid+'">'+I.save+'</button></div>').join("");}
  return'<div class="screen"><div class="hdr"><button class="hbtn" id="bb">'+I.back+'</button><div class="hdr-c" style="text-align:center"><h1>Admin</h1></div><div style="width:36px"></div></div><div class="tabs">'+tabs.map(t=>'<div class="tab'+(S.adminTab===t.id?" act":"")+'" data-tab="'+t.id+'">'+t.l+'</div>').join("")+'</div><div class="sp" style="padding:10px 12px 80px">'+c+'</div></div>';
}

function bindAll(){
  document.querySelectorAll("[data-unit]").forEach(b=>b.addEventListener("click",()=>{S.pinTarget=b.dataset.unit;S.pinVal="";S.pinError=false;S.screen="pin";render();}));
  const ba=$("ba");if(ba)ba.addEventListener("click",()=>{S.pinTarget="ADMIN";S.pinVal="";S.pinError=false;S.screen="pin";render();});
  const bb=$("bb");if(bb)bb.addEventListener("click",()=>{if(S.screen==="ward"||S.screen==="admin"){S.screen="home";S.showCivil={};render();}else if(S.screen==="detail"||S.screen==="add"){S.screen="ward";render();}else if(S.screen==="pin"){S.screen="home";render();}});
  const bdl=$("bdl");if(bdl)bdl.addEventListener("click",()=>backupPNG());
  const tc=$("tc");if(tc&&S.editP)tc.addEventListener("click",e=>{e.stopPropagation();S.showCivil[S.editP._k]=!S.showCivil[S.editP._k];render();});
  document.querySelectorAll("[data-pin]").forEach(k=>k.addEventListener("click",()=>{const v=k.dataset.pin;if(v==="\u232b")S.pinVal=S.pinVal.slice(0,-1);else if(S.pinVal.length<6)S.pinVal+=v;S.pinError=false;if(S.pinVal.length===4||(S.pins[S.pinTarget]&&S.pins[S.pinTarget].length>4&&S.pinVal.length===6))checkPin();else render();}));
  document.querySelectorAll("[data-filt]").forEach(f=>f.addEventListener("click",()=>{S.filter=f.dataset.filt;render();}));
  const si=$("si");if(si)si.addEventListener("input",e=>{S.search=e.target.value;render();});
  document.querySelectorAll(".pc").forEach(c=>c.addEventListener("click",()=>{const p=S.patients.find(x=>x._k===c.dataset.key);if(p){S.editP=p;S.editCode=p.code;S.screen="detail";render();}}));
  document.querySelectorAll("[data-cpick='e']").forEach(c=>c.addEventListener("click",()=>{S.editCode=+c.dataset.code;render();}));
  document.querySelectorAll("[data-cpick='a']").forEach(c=>c.addEventListener("click",()=>{S.addCode=+c.dataset.code;render();}));
  const bs=$("bs");if(bs)bs.addEventListener("click",async()=>{bs.disabled=true;const data={...S.editP,ward:$("ew").value.trim(),code:S.editCode,notes:$("en").value.trim(),ts:Date.now()};delete data._k;try{await set(ref(db,"patients/"+S.unit+"/"+S.editP._k),data);toast("Saved");}catch(e){LS.queueOp({type:"set",path:"patients/"+S.unit+"/"+S.editP._k,data});_offlineUpdate(S.unit,S.editP._k,data);toast("Saved offline","ok");}S.screen="ward";render();});
  const bd=$("bd");if(bd)bd.addEventListener("click",async()=>{if(!await confirm2("Delete?","Remove \""+S.editP.name+"\"?"))return;try{await remove(ref(db,"patients/"+S.unit+"/"+S.editP._k));toast("Deleted");}catch(e){LS.queueOp({type:"remove",path:"patients/"+S.unit+"/"+S.editP._k});_offlineRemove(S.unit,S.editP._k);toast("Deleted offline","ok");}S.screen="ward";render();});
  const badd=$("badd");if(badd)badd.addEventListener("click",()=>{S.addCode=null;S.screen="add";render();});
  const bsa=$("bsa");if(bsa)bsa.addEventListener("click",async()=>{const n=$("an").value.trim(),c=$("ac").value.trim(),w=$("aw").value.trim(),nat=$("at").value.trim(),notes=$("ao").value.trim();if(!n||!c||!w||!S.addCode){toast("Fill required","err");return;}bsa.disabled=true;const data={name:n,civil:c,nat,ward:w,code:S.addCode,notes,ts:Date.now()};try{await push(ref(db,"patients/"+S.unit),data);toast("Added");}catch(e){const offKey="off_"+Date.now();LS.queueOp({type:"push",path:"patients/"+S.unit,data});_offlineUpdate(S.unit,offKey,data);toast("Added offline","ok");}S.screen="ward";render();});
  document.querySelectorAll("[data-tab]").forEach(t=>t.addEventListener("click",()=>{S.adminTab=t.dataset.tab;render();}));
  const oz=$("oz");if(oz)oz.addEventListener("click",()=>{const f=$("of");if(f)f.click();});
  const of_=$("of");if(of_)of_.addEventListener("change",handleOCR);
  document.querySelectorAll("[data-ocr]").forEach(c=>c.addEventListener("click",()=>{const i=+c.dataset.ocr;if(S.ocrSel.includes(i))S.ocrSel=S.ocrSel.filter(x=>x!==i);else S.ocrSel.push(i);render();}));
  const osa=$("osa");if(osa)osa.addEventListener("click",()=>{S.ocrSel=S.ocrSel.length===S.ocrResults.length?[]:S.ocrResults.map((_,i)=>i);render();});
  const oi=$("oi");if(oi)oi.addEventListener("click",importOCR);
  document.querySelectorAll("[data-sp]").forEach(b=>b.addEventListener("click",async()=>{const uid=b.dataset.sp,v=$("p-"+uid);const pv=v?v.value.trim():"";if(!pv||pv.length<4){toast("Min 4 digits","err");return;}try{await set(ref(db,"pins/"+uid),pv);S.pins[uid]=pv;toast("Saved");}catch(e){toast("Failed","err");}}));
}

function checkPin(){const c=S.pins[S.pinTarget]||PINS[S.pinTarget];if(S.pinVal===c){if(S.pinTarget==="ADMIN"){S.screen="admin";S.adminTab="overview";listenAll();}else{S.screen="ward";S.filter="all";S.search="";S._bp=true;listenUnit(S.pinTarget);}render();}else{S.pinError=true;S.pinVal="";render();}}

function handleOCR(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=async ev=>{S.ocrImg=ev.target.result;S.ocrB64=ev.target.result.split(",")[1];S.ocrResults=[];S.ocrSel=[];S.ocrLoading=true;render();try{const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+GK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:file.type,data:S.ocrB64}},{text:'Extract ALL patients from this image. Return ONLY a JSON array: [{"name":"Full Name","civil":"Civil ID number","nat":"Nationality","ward":"Ward/bed info","code":1,"notes":"any notes"}]. code: 1=green,2=yellow,3=red,4=critical. If no patients found return [].'}]}]})});if(!res.ok){const errText=await res.text();console.error("Gemini API error:",res.status,errText);toast("API error "+res.status,"err");S.ocrLoading=false;render();return;}const data=await res.json();console.log("Gemini response:",JSON.stringify(data).slice(0,500));const raw=data.candidates?.[0]?.content?.parts?.[0]?.text||"[]";const cleaned=raw.replace(/```json|```/g,"").trim();S.ocrResults=JSON.parse(cleaned);if(!Array.isArray(S.ocrResults))S.ocrResults=[];S.ocrSel=S.ocrResults.map((_,i)=>i);if(!S.ocrResults.length)toast("No patients found","err");}catch(err){console.error("OCR error:",err);toast("OCR failed: "+err.message,"err");S.ocrResults=[];}S.ocrLoading=false;render();};reader.readAsDataURL(file);}

async function importOCR(){const uid=$("ou")?.value;if(!uid||!S.ocrSel.length)return;const b=$("oi");b.disabled=true;try{for(const i of S.ocrSel){const p=S.ocrResults[i];await push(ref(db,"patients/"+uid),{name:p.name||"",civil:p.civil||"",nat:p.nat||"",ward:p.ward||"",code:+p.code||2,notes:p.notes||"",ts:Date.now()});}toast("Imported "+S.ocrSel.length);S.ocrResults=[];S.ocrSel=[];S.ocrImg=null;render();}catch(e){toast("Failed","err");b.disabled=false;}}

let _dp=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();
  _dp=e;
  if(!localStorage.getItem(installGuideKey))setTimeout(showInstallGuide,1500);
  if(!localStorage.getItem("mi"))setTimeout(()=>{
    const b=$("ibanner");
    if(b)b.classList.add("show");
  },3000);
});
const ib=$("ib-btn");if(ib)ib.addEventListener("click",()=>showInstallGuide(true));
window.dismissInstall=()=>{const b=$("ibanner");if(b)b.classList.remove("show");localStorage.setItem("mi","1");};
window.addEventListener("online",()=>{S.online=true;render();syncQueue();});
window.addEventListener("offline",()=>{S.online=false;render();});
const installGuidePrev=$("install-guide-prev");
if(installGuidePrev)installGuidePrev.addEventListener("click",()=>advanceInstallGuide(-1));
const installGuideNext=$("install-guide-next");
if(installGuideNext)installGuideNext.addEventListener("click",()=>advanceInstallGuide(1));
const installGuideNow=$("install-guide-now");
if(installGuideNow)installGuideNow.addEventListener("click",openInstallPrompt);
const installGuideClose=$("install-guide-close");
if(installGuideClose)installGuideClose.addEventListener("click",hideInstallGuide);
const installGuideEl=$("install-guide");
if(installGuideEl)installGuideEl.addEventListener("click",e=>{if(e.target===installGuideEl)hideInstallGuide();});

async function boot(){try{listenAll();S.screen="home";render();await seedData();if(navigator.onLine)syncQueue();}catch(e){showFatal('<div style="padding:40px;color:red;font-size:14px;word-break:break-all"><b>Boot Error:</b><br>'+e.message+'<br><br>'+e.stack+'</div>');}}
boot();
</script>
<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.getRegistrations()
    .then(rs=>Promise.all(rs.map(r=>r.unregister())))
    .catch(()=>{})
    .finally(()=>{
      navigator.serviceWorker.register("/sw.js",{updateViaCache:"none"})
        .then(r=>r.update())
        .catch(err=>console.warn("Service worker registration failed",err));
    });
}
</script>
</body>
</html>
