name: MedEvac
options:
  bundleIdPrefix: com.medevac
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  MedEvac:
    type: application
    platform: iOS
    sources:
      - path: MedEvac
        excludes:
          - "*.html"
          - "*.js"
          - "*.json"
          - "*.png"
          - "*.rules.json"
    resources:
      - path: MedEvac/index.html
      - path: MedEvac/sw.js
      - path: MedEvac/manifest.json
      - path: MedEvac/icon-192.png
      - path: MedEvac/icon-512.png
      - path: MedEvac/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medevac.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: MedEvac/Info.plist
        DEVELOPMENT_TEAM: YPGU5K4U57
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        GENERATE_INFOPLIST_FILE: NO
