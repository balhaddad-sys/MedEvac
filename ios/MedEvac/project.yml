name: MedEvac
options:
  bundleIdPrefix: com.medevac
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  MedEvac:
    type: application
    platform: iOS
    sources:
      - path: MedEvac
        excludes:
          - "*.html"
          - "*.js"
          - "*.json"
          - "*.png"
          - "*.rules.json"
    resources:
      - path: MedEvac/index.html
      - path: MedEvac/sw.js
      - path: MedEvac/manifest.json
      - path: MedEvac/icon-192.png
      - path: MedEvac/icon-512.png
      - path: MedEvac/Assets.xcassets
    info:
      path: MedEvac/Info.plist
      properties:
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.medical
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSAllowsArbitraryLoadsInWebContent: false
        UILaunchScreen:
          UIColorName: LaunchBg
        LSRequiresIPhoneOS: true
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: true
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.medevac.app
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: 5
        DEVELOPMENT_TEAM: YPGU5K4U57
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "Meward new"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
