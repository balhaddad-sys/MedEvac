name: Build iOS App

on:
  push:
    branches: [main]
    paths:
      - 'MAK_Registry/**'
      - 'ios/**'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Copy web assets into iOS project
        run: |
          cp MAK_Registry/index.html ios/MedEvac/MedEvac/
          cp MAK_Registry/sw.js ios/MedEvac/MedEvac/
          cp MAK_Registry/manifest.json ios/MedEvac/MedEvac/
          cp MAK_Registry/icon-192.png ios/MedEvac/MedEvac/
          cp MAK_Registry/icon-512.png ios/MedEvac/MedEvac/

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd ios/MedEvac
          xcodegen generate

      - name: Install Apple certificate and provisioning profile
        if: ${{ env.HAS_SIGNING == 'true' }}
        env:
          HAS_SIGNING: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build unsigned (simulator)
        if: ${{ env.HAS_SIGNING != 'true' }}
        env:
          HAS_SIGNING: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        run: |
          cd ios/MedEvac
          xcodebuild build \
            -project MedEvac.xcodeproj \
            -scheme MedEvac \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive signed IPA
        if: ${{ env.HAS_SIGNING == 'true' }}
        env:
          HAS_SIGNING: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        run: |
          cd ios/MedEvac
          xcodebuild archive \
            -project MedEvac.xcodeproj \
            -scheme MedEvac \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/MedEvac.xcarchive \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

          xcodebuild -exportArchive \
            -archivePath build/MedEvac.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export

      - name: Upload to TestFlight
        if: ${{ env.HAS_API_KEY == 'true' }}
        env:
          HAS_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 != '' }}
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_KEY_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_${API_KEY_ID}.p8

          xcrun altool --upload-app \
            -f ios/MedEvac/build/export/MedEvac.ipa \
            -t ios \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_KEY_ISSUER"

      - name: Upload simulator build
        if: ${{ env.HAS_SIGNING != 'true' }}
        env:
          HAS_SIGNING: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: medevac-ios-simulator
          path: ios/MedEvac/build/Build/Products/Release-iphonesimulator/MedEvac.app
          retention-days: 30

      - name: Upload signed IPA
        if: ${{ env.HAS_SIGNING == 'true' }}
        env:
          HAS_SIGNING: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: medevac-ios-ipa
          path: ios/MedEvac/build/export/MedEvac.ipa
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
