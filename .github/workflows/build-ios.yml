name: Build iOS App

on:
  push:
    branches: [main]
    paths:
      - 'MAK_Registry/**'
      - 'ios/**'
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Codemagic CLI tools
        run: pip3 install codemagic-cli-tools --break-system-packages

      - name: Copy web assets into iOS project
        run: |
          cp MAK_Registry/index.html ios/MedEvac/MedEvac/
          cp MAK_Registry/sw.js ios/MedEvac/MedEvac/
          cp MAK_Registry/manifest.json ios/MedEvac/MedEvac/
          cp MAK_Registry/icon-192.png ios/MedEvac/MedEvac/
          cp MAK_Registry/icon-512.png ios/MedEvac/MedEvac/

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd ios/MedEvac
          xcodegen generate

      - name: Fetch signing files
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: R46235PLDH
          APP_STORE_CONNECT_ISSUER_ID: 5988b726-9289-48c6-ac37-4c603d29fa6a
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          echo "${{ secrets.APPLE_CERT_PRIVATE_KEY }}" > /tmp/cert_key.pem
          app-store-connect fetch-signing-files com.medevac.app \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Archive signed IPA
        run: |
          BUILD=$(grep 'CURRENT_PROJECT_VERSION' ios/MedEvac/project.yml | head -1 | sed 's/.*: //' | tr -d '"')
          VERSION=$(grep 'MARKETING_VERSION' ios/MedEvac/project.yml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Building version $VERSION ($BUILD)"
          cd ios/MedEvac
          xcodebuild archive \
            -project MedEvac.xcodeproj \
            -scheme MedEvac \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/MedEvac.xcarchive \
            DEVELOPMENT_TEAM="YPGU5K4U57" \
            CURRENT_PROJECT_VERSION="$BUILD" \
            MARKETING_VERSION="$VERSION"

          # Find the installed App Store provisioning profile and extract its name
          PROFILE_PATH=$(find ~/Library -name "IOS_APP_STORE_*.mobileprovision" 2>/dev/null | head -1)
          echo "Found profile at: $PROFILE_PATH"
          PROFILE_NAME=$(openssl smime -in "$PROFILE_PATH" -inform DER -verify -noverify 2>/dev/null | \
            /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin)
          echo "Using profile: $PROFILE_NAME"

          # Generate ExportOptions.plist with the actual profile name
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>YPGU5K4U57</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.medevac.app</key>
                  <string>$PROFILE_NAME</string>
              </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/MedEvac.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: R46235PLDH
          APP_STORE_CONNECT_ISSUER_ID: 5988b726-9289-48c6-ac37-4c603d29fa6a
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          app-store-connect publish \
            --path ios/MedEvac/build/export/MedEvac.ipa

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: medevac-ios-ipa
          path: ios/MedEvac/build/export/MedEvac.ipa
          retention-days: 30

      - name: Cleanup keychain
        if: always()
        run: |
          keychain cleanup 2>/dev/null || true
