name: Build Android APK (TWA)

on:
  push:
    branches: [main]
    paths:
      - 'MAK_Registry/**'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p "$HOME/.bubblewrap"
          cat > "$HOME/.bubblewrap/config.json" << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF

      - name: Generate signing keystore
        run: |
          mkdir -p twa-build
          keytool -genkeypair \
            -alias medevac \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -keystore twa-build/keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -dname "CN=MedEvac, O=MedEvac, L=Kuwait, C=KW"

      - name: Initialize and build TWA
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          HOSTING_URL: ${{ secrets.FIREBASE_HOSTING_URL }}
        run: |
          cd twa-build

          # Use expect-like approach: pipe all answers to bubblewrap init
          # Answers: n (no JDK install), then all defaults
          printf 'n\n' | bubblewrap init \
            --manifest "https://${HOSTING_URL}/manifest.json" \
            --directory .

          # Now build with Gradle directly — no interactive prompts
          chmod +x ./gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/keystore.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias=medevac \
            -Pandroid.injected.signing.key.password="$KEYSTORE_PASSWORD"

          # Find the output APK
          find . -name "*.apk" -type f | head -5
          cp app/build/outputs/apk/release/app-release.apk ../medevac-release.apk 2>/dev/null || \
          cp $(find . -name "*release*.apk" -type f | head -1) ../medevac-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: medevac-apk
          path: medevac-release.apk
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: medevac-release.apk
