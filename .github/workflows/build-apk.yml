name: Build Android APK (TWA)

on:
  push:
    branches: [main]
    paths:
      - 'MAK_Registry/**'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize TWA project
        run: |
          mkdir -p twa-build && cd twa-build
          cat > twa-manifest.json << 'MANIFEST'
          {
            "packageId": "com.medevac.app",
            "host": "${{ secrets.FIREBASE_HOSTING_URL }}",
            "name": "MedEvac",
            "launcherName": "MedEvac",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#1d4ed8",
            "navigationColor": "#1e40af",
            "backgroundColor": "#f0f6ff",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://${{ secrets.FIREBASE_HOSTING_URL }}/icon-512.png",
            "maskableIconUrl": "https://${{ secrets.FIREBASE_HOSTING_URL }}/icon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {
              "path": "./keystore.jks",
              "alias": "medevac"
            },
            "appVersionCode": ${{ github.run_number }},
            "appVersion": "1.0.${{ github.run_number }}",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "fallbackType": "customtabs",
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "fingerprints": []
          }
          MANIFEST

      - name: Generate signing keystore
        run: |
          cd twa-build
          keytool -genkeypair \
            -alias medevac \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -keystore keystore.jks \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=MedEvac, O=MedEvac, L=Kuwait, C=KW"

      - name: Build TWA
        run: |
          cd twa-build
          bubblewrap build \
            --manifest twa-manifest.json \
            --signingKeyPath ./keystore.jks \
            --signingKeyAlias medevac \
            --signingKeyPassword ${{ secrets.KEYSTORE_PASSWORD }} \
            --signingStorePassword ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: medevac-apk
          path: twa-build/app-release-signed.apk
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: twa-build/app-release-signed.apk
