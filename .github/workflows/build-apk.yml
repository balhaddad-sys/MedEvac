name: Build Android APK (TWA)

on:
  push:
    branches: [main]
    paths:
      - 'MAK_Registry/**'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      HOSTING_URL: unit-e-1d07b.web.app
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -alias medevac \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -keystore ${{ runner.temp }}/keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -dname "CN=MedEvac, O=MedEvac, L=Kuwait, C=KW"

      - name: Create TWA Gradle project
        run: |
          mkdir -p twa-build/app/src/main/res/values
          mkdir -p twa-build/app/src/main/res/xml
          mkdir -p twa-build/app/src/main/res/drawable
          mkdir -p twa-build/app/src/main/res/mipmap-xxxhdpi
          mkdir -p twa-build/gradle/wrapper

          # Download icon
          curl -sL "https://${HOSTING_URL}/icon-512.png" -o twa-build/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # settings.gradle
          cat > twa-build/settings.gradle << 'EOF'
          rootProject.name = 'MedEvac'
          include ':app'
          EOF

          # Root build.gradle
          cat > twa-build/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          # App build.gradle
          cat > twa-build/app/build.gradle << APPEOF
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.medevac.app'
              compileSdk 34

              defaultConfig {
                  applicationId "com.medevac.app"
                  minSdk 21
                  targetSdk 34
                  versionCode ${GITHUB_RUN_NUMBER}
                  versionName "1.0.${GITHUB_RUN_NUMBER}"

                  manifestPlaceholders = [
                      hostName: "${HOSTING_URL}",
                      assetStatements: '[{"relation": ["delegate_permission/common.handle_all_urls"], "target": {"namespace": "web", "site": "https://${HOSTING_URL}"}}]'
                  ]
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.browser:browser:1.8.0'
          }
          APPEOF

          # AndroidManifest.xml
          cat > twa-build/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <application
                  android:name=".Application"
                  android:label="MedEvac"
                  android:icon="@mipmap/ic_launcher"
                  android:theme="@style/AppTheme"
                  android:allowBackup="true">

                  <meta-data
                      android:name="asset_statements"
                      android:value='${assetStatements}' />

                  <activity
                      android:name=".LauncherActivity"
                      android:exported="true"
                      android:theme="@style/LaunchTheme">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="https" android:host="${hostName}" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # LauncherActivity.java
          mkdir -p twa-build/app/src/main/java/com/medevac/app
          cat > twa-build/app/src/main/java/com/medevac/app/LauncherActivity.java << JAVAEOF
          package com.medevac.app;

          import android.net.Uri;
          import android.os.Bundle;
          import androidx.browser.customtabs.CustomTabsIntent;
          import androidx.browser.trusted.TrustedWebActivityIntentBuilder;
          import androidx.browser.trusted.TrustedWebActivityIntent;
          import android.app.Activity;

          public class LauncherActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  Uri uri = Uri.parse("https://${HOSTING_URL}/");
                  TrustedWebActivityIntentBuilder builder = new TrustedWebActivityIntentBuilder(uri);
                  TrustedWebActivityIntent twaIntent = builder.build(
                      new CustomTabsIntent.Builder().build().intent
                  );
                  startActivity(twaIntent.getIntent());
                  finish();
              }
          }
          JAVAEOF

          # Application.java
          cat > twa-build/app/src/main/java/com/medevac/app/Application.java << 'JAVAEOF'
          package com.medevac.app;

          public class Application extends android.app.Application {
          }
          JAVAEOF

          # styles
          cat > twa-build/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:statusBarColor">#1d4ed8</item>
                  <item name="android:navigationBarColor">#1e40af</item>
              </style>
              <style name="LaunchTheme" parent="AppTheme">
                  <item name="android:windowBackground">#0f172a</item>
              </style>
          </resources>
          EOF

          # Gradle wrapper properties
          cat > twa-build/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # gradle-wrapper.jar — use gradle init to bootstrap
          cd twa-build
          gradle wrapper --gradle-version 8.5

      - name: Build APK
        run: |
          cd twa-build
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="${{ runner.temp }}/keystore.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias=medevac \
            -Pandroid.injected.signing.key.password="${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Copy APK
        run: |
          cp twa-build/app/build/outputs/apk/release/app-release.apk medevac-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: medevac-apk
          path: medevac-release.apk
          retention-days: 30

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: medevac-release.apk
